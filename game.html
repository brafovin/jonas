<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stickman Fight Legacy</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0A0A0A;
      color: #fff;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px 8px 24px;
      user-select: none;
    }

    #back-btn {
      align-self: flex-start;
      color: #FF3D00;
      text-decoration: none;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 0.04em;
      padding: 6px 0;
      margin-bottom: 8px;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    #back-btn:hover { opacity: 0.7; }

    #game-title {
      font-family: 'Bangers', cursive;
      font-size: clamp(28px, 6vw, 52px);
      color: #FF3D00;
      letter-spacing: 0.08em;
      text-shadow: 0 0 20px rgba(255,61,0,0.6), 0 0 40px rgba(255,61,0,0.3);
      margin-bottom: 14px;
      text-align: center;
    }

    #canvas-wrapper {
      position: relative;
      width: 100%;
      max-width: 900px;
    }

    #game {
      display: block;
      width: 100%;
      max-width: 900px;
      height: auto;
      border: 1px solid rgba(255,61,0,0.25);
      box-shadow: 0 0 40px rgba(255,61,0,0.15), 0 0 80px rgba(255,61,0,0.07);
    }

    #touch-controls {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      width: 100%;
      max-width: 900px;
      margin-top: 16px;
      padding: 0 6px;
      gap: 8px;
    }

    .touch-side {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .touch-label {
      font-family: 'Bangers', cursive;
      font-size: 14px;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.45);
    }
    .touch-cluster {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .touch-group {
      display: flex;
      gap: 8px;
    }

    .touch-btn {
      background: rgba(255,255,255,0.04);
      border: 2px solid #FF3D00;
      color: #FF3D00;
      font-family: 'Bangers', cursive;
      font-size: 26px;
      letter-spacing: 0.06em;
      width: 62px;
      height: 62px;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 12px rgba(255,61,0,0.2);
      transition: background 0.1s, box-shadow 0.1s, transform 0.05s;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      user-select: none;
    }

    .touch-btn:active,
    .touch-btn.pressed {
      background: rgba(255,61,0,0.22);
      box-shadow: 0 0 24px rgba(255,61,0,0.6);
      transform: scale(0.93);
    }

    .touch-btn.atk { background: rgba(255,61,0,0.10); }
    .touch-btn.ult {
      border-color: #FFD23D;
      color: #FFD23D;
      background: rgba(255,210,61,0.08);
      box-shadow: 0 0 14px rgba(255,210,61,0.3);
    }
    .touch-btn.ult:active,
    .touch-btn.ult.pressed {
      background: rgba(255,210,61,0.25);
      box-shadow: 0 0 26px rgba(255,210,61,0.7);
    }

    @media (min-width: 900px) {
      #touch-controls { display: none; }
    }

    /* ===== Mode select menu ===== */
    #menu {
      position: absolute;
      inset: 0;
      background: rgba(5,5,5,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      z-index: 10;
      backdrop-filter: blur(2px);
    }
    #menu.hidden { display: none; }
    #map-select {
      position: absolute;
      inset: 0;
      background: rgba(5,5,5,0.92);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      z-index: 10;
      backdrop-filter: blur(2px);
    }
    #map-select.visible { display: flex; }
    #menu h2, #map-select h2 {
      font-family: 'Bangers', cursive;
      font-size: clamp(26px, 5vw, 44px);
      color: #fff;
      letter-spacing: 0.06em;
      text-shadow: 0 0 18px rgba(255,61,0,0.5);
    }
    .mode-btn {
      background: rgba(255,61,0,0.06);
      border: 2px solid #FF3D00;
      color: #FF3D00;
      font-family: 'Bangers', cursive;
      font-size: clamp(20px, 3.5vw, 30px);
      letter-spacing: 0.05em;
      padding: 16px 34px;
      border-radius: 14px;
      cursor: pointer;
      min-width: 320px;
      box-shadow: 0 0 20px rgba(255,61,0,0.25);
      transition: transform 0.12s, background 0.12s, box-shadow 0.12s;
    }
    .mode-btn:hover {
      transform: scale(1.04);
      background: rgba(255,61,0,0.16);
      box-shadow: 0 0 36px rgba(255,61,0,0.5);
    }
    .mode-btn span {
      display: block;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.55);
      margin-top: 6px;
    }
    .map-btn-row { display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; }
    .map-btn {
      background: rgba(255,255,255,0.04);
      border: 2px solid rgba(255,255,255,0.25);
      color: #fff;
      font-family: 'Bangers', cursive;
      font-size: clamp(22px, 3.5vw, 32px);
      letter-spacing: 0.05em;
      padding: 18px 30px;
      border-radius: 14px;
      cursor: pointer;
      min-width: 200px;
      text-align: center;
      transition: transform 0.12s, background 0.12s, border-color 0.12s, box-shadow 0.12s;
    }
    .map-btn:hover { transform: scale(1.05); }
    .map-btn.desert { border-color: #D4840A; color: #F5A623; box-shadow: 0 0 20px rgba(212,132,10,0.3); }
    .map-btn.desert:hover { background: rgba(212,132,10,0.14); box-shadow: 0 0 36px rgba(212,132,10,0.55); }
    .map-btn.ice { border-color: #5BC8FF; color: #A8DFFF; box-shadow: 0 0 20px rgba(91,200,255,0.3); }
    .map-btn.ice:hover { background: rgba(91,200,255,0.12); box-shadow: 0 0 36px rgba(91,200,255,0.55); }
    .map-btn.grass { border-color: #5BC44A; color: #A6E68A; box-shadow: 0 0 20px rgba(91,196,74,0.3); }
    .map-btn.grass:hover { background: rgba(91,196,74,0.12); box-shadow: 0 0 36px rgba(91,196,74,0.55); }
    .map-btn.castle { border-color: #B0A088; color: #D8C8A8; box-shadow: 0 0 20px rgba(176,160,136,0.3); }
    .map-btn.castle:hover { background: rgba(176,160,136,0.14); box-shadow: 0 0 36px rgba(176,160,136,0.55); }
    .map-btn .map-icon { font-size: 2em; display: block; margin-bottom: 6px; }
    .map-btn .map-sub { display: block; font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.5); margin-top: 6px; letter-spacing: 0.04em; }
    .back-link { font-family: 'Inter', sans-serif; font-size: 13px; color: rgba(255,255,255,0.4); cursor: pointer; background: none; border: none; text-decoration: underline; margin-top: 4px; }
    .back-link:hover { color: #FF3D00; }
  </style>
</head>
<body>
  <a id="back-btn" href="index.html">&#8592; Zur&uuml;ck</a>
  <div id="game-title">STICKMAN FIGHT LEGACY</div>

  <div id="canvas-wrapper">
    <canvas id="game" width="900" height="500"></canvas>

    <!-- Map Selection -->
    <div id="map-select">
      <h2>WÄHLE DEINE MAP</h2>
      <div class="map-btn-row">
        <button class="map-btn desert" id="map-desert">
          <span class="map-icon">🏜️</span>
          WÜSTE
          <span class="map-sub">Kakten · Sand · Glut</span>
        </button>
        <button class="map-btn ice" id="map-ice">
          <span class="map-icon">❄️</span>
          EIS
          <span class="map-sub">Schnee · Eis · Kälte</span>
        </button>
        <button class="map-btn grass" id="map-grass">
          <span class="map-icon">🌳</span>
          GRASLAND
          <span class="map-sub">Wiese · Hügel · Burg am Horizont</span>
        </button>
        <button class="map-btn castle" id="map-castle">
          <span class="map-icon">🏰</span>
          BURG
          <span class="map-sub">Steinmauern · Zinnen · Fackeln</span>
        </button>
      </div>
      <button class="back-link" id="map-back">← Zurück zur Modusauswahl</button>
    </div>

    <div id="menu">
      <h2>WÄHLE DEINEN MODUS</h2>
      <button class="mode-btn" id="mode-ai">
        1 SPIELER VS KI
        <span>Spieler 1: A / D — Bewegen &nbsp;·&nbsp; LEERTASTE — Angriff</span>
      </button>
      <button class="mode-btn" id="mode-pvp">
        2 SPIELER (PVP)
        <span>S1: A/D + S-Sprung + LEERTASTE &nbsp;·&nbsp; S2: ←/→ + ↑-Sprung + ENTER</span>
      </button>
      <button class="mode-btn" id="mode-soccer">
        ⚽ FUSSBALL (2 SPIELER)
        <span>Schieß den Ball ins gegnerische Tor — Angriff = Schuss!</span>
      </button>
    </div>
  </div>

  <div id="touch-controls">
    <!-- Player 1 -->
    <div class="touch-side" id="touch-p1">
      <span class="touch-label">SPIELER 1</span>
      <div class="touch-cluster">
        <div class="touch-group">
          <button class="touch-btn" data-key="a">&#9664;</button>
          <button class="touch-btn" data-key="d">&#9654;</button>
        </div>
        <div class="touch-group">
          <button class="touch-btn" data-key="s">&#9650;</button>
          <button class="touch-btn atk" data-key=" ">&#9876;</button>
          <button class="touch-btn ult" data-ultra="p1">&#9889;</button>
        </div>
      </div>
    </div>
    <!-- Player 2 (only in PvP) -->
    <div class="touch-side" id="touch-p2" style="display:none">
      <span class="touch-label">SPIELER 2</span>
      <div class="touch-cluster">
        <div class="touch-group">
          <button class="touch-btn" data-key="ArrowLeft">&#9664;</button>
          <button class="touch-btn" data-key="ArrowRight">&#9654;</button>
        </div>
        <div class="touch-group">
          <button class="touch-btn" data-key="ArrowUp">&#9650;</button>
          <button class="touch-btn atk" data-key="Enter">&#9876;</button>
          <button class="touch-btn ult" data-ultra="p2">&#9889;</button>
        </div>
      </div>
    </div>
  </div>

  <script>
  (function() {
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const W = 900, H = 500;
    const GROUND = 420;
    const PLAYER_SPEED = 4;
    const AI_SPEED = 2.5;
    const JUMP_FORCE = -13;
    const GRAVITY = 0.55;
    const HIT_DAMAGE = 10;
    const ULTRA_DAMAGE = 30;
    const ULTRA_COOLDOWN = 130;
    const PLAYER_COOLDOWN = 45;
    const AI_COOLDOWN = 80;
    const ATTACK_FRAMES = 20;

    // Soccer
    const GOAL_DEPTH = 26;     // how far the goal sticks into the field
    const GOAL_HEIGHT = 150;   // goal mouth height
    const GOALS_TO_WIN = 5;

    let shake = 0;          // screen-shake intensity
    let ball = null;
    let score = { p1: 0, p2: 0 };
    let goalFlash = 0;      // celebration timer after a goal

    const keys = {};
    const blockScroll = ['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Enter', ' '];
    document.addEventListener('keydown', e => {
      keys[e.key] = true;
      if (blockScroll.includes(e.key)) e.preventDefault();
    });
    document.addEventListener('keyup', e => { keys[e.key] = false; });

    // Touch controls — bind every button with data-key or data-ultra
    function bindTouchButton(el) {
      // Which keys does this button set?
      let setKeys;
      if (el.dataset.ultra === 'p1')      setKeys = ['a', 'd'];                 // P1 ultra = A+D
      else if (el.dataset.ultra === 'p2') setKeys = ['ArrowLeft', 'ArrowRight']; // P2 ultra = ←+→
      else                                setKeys = [el.dataset.key];

      const press = (e) => {
        e.preventDefault();
        setKeys.forEach(k => { keys[k] = true; });
        el.classList.add('pressed');
      };
      const release = (e) => {
        e.preventDefault();
        setKeys.forEach(k => { keys[k] = false; });
        el.classList.remove('pressed');
      };
      el.addEventListener('touchstart', press, { passive: false });
      el.addEventListener('touchend', release, { passive: false });
      el.addEventListener('touchcancel', release, { passive: false });
      el.addEventListener('mousedown', press);
      el.addEventListener('mouseup', release);
      el.addEventListener('mouseleave', release);
    }
    document.querySelectorAll('#touch-controls .touch-btn').forEach(bindTouchButton);

    let player, ai, gameOver, gameOverTimer, winner;
    let particles = [];
    let snow = [];
    let mode = null;       // 'ai' or 'pvp'
    let map  = null;       // 'desert' or 'ice'
    let started = false;

    const menuEl    = document.getElementById('menu');
    const mapSelEl  = document.getElementById('map-select');

    function showMenu() {
      started = false;
      mode = null;
      map  = null;
      mapSelEl.classList.remove('visible');
      menuEl.classList.remove('hidden');
    }

    function showMapSelect() {
      menuEl.classList.add('hidden');
      mapSelEl.classList.add('visible');
    }

    function startGame(selectedMap) {
      map = selectedMap;
      mapSelEl.classList.remove('visible');
      started = true;
      snow = [];
      // Show Player 2 touch controls in PvP and Soccer (both are 2-player)
      document.getElementById('touch-p2').style.display =
        (mode === 'pvp' || mode === 'soccer') ? 'flex' : 'none';
      init();
    }

    // Z key → back to menu anytime (but don't let keydown propagate as 'z' movement)
    document.addEventListener('keydown', e => {
      if (e.key === 'z' || e.key === 'Z') {
        if (started) { showMenu(); }
        e.preventDefault();
      }
    });

    document.getElementById('mode-ai').addEventListener('click', () => { mode = 'ai'; showMapSelect(); });
    document.getElementById('mode-pvp').addEventListener('click', () => { mode = 'pvp'; showMapSelect(); });
    document.getElementById('mode-soccer').addEventListener('click', () => { mode = 'soccer'; showMapSelect(); });
    document.getElementById('map-desert').addEventListener('click', () => startGame('desert'));
    document.getElementById('map-ice').addEventListener('click', () => startGame('ice'));
    document.getElementById('map-grass').addEventListener('click', () => startGame('grass'));
    document.getElementById('map-castle').addEventListener('click', () => startGame('castle'));
    document.getElementById('map-back').addEventListener('click', showMenu);

    function createStickman(x, isPlayer) {
      return {
        x, y: GROUND,
        isPlayer,
        hp: 100,
        dir: isPlayer ? 1 : -1,
        attacking: false,
        attackFrame: 0,
        cooldown: 0,
        hit: false, hitFlash: 0,
        aiState: 'chase',
        aiBackTimer: 0,
        knockback: 0,
        knockbackDir: 0,
        vy: 0,
        onGround: true,
        moving: false,        // is currently walking this frame
        walkPhase: 0,         // continuous leg-cycle angle
        walkBlend: 0,         // 0..1 smooth blend in/out of walk
        moveDir: 0,           // -1/+1 direction of movement (for lean)
        isUltra: false,       // current attack is an ultra
        ultraFlash: 0,        // banner timer after firing ultra
      };
    }

    // Advance walk-cycle state each frame (call once per stickman in update)
    function stepWalk(s) {
      if (s.moving) {
        s.walkPhase += 0.32;
        s.walkBlend = Math.min(1, s.walkBlend + 0.18);
      } else {
        s.walkBlend = Math.max(0, s.walkBlend - 0.16);
      }
    }

    function init() {
      player = createStickman(150, true);
      ai = createStickman(750, false);
      gameOver = false;
      gameOverTimer = 0;
      winner = null;
      particles = [];
      if (mode === 'soccer') {
        score = { p1: 0, p2: 0 };
        goalFlash = 0;
        resetBall(0);
      }
    }

    function resetBall(dir) {
      ball = {
        x: W / 2, y: GROUND - 200, r: 16,
        vx: dir ? dir * 3 : (Math.random() < 0.5 ? -3 : 3),
        vy: 0,
        rot: 0,
      };
      // Put players back to their halves
      player.x = 150; ai.x = 750;
    }

    // Particle system for hit effects
    function spawnParticles(x, y, color, count) {
      const n = count || 14;
      for (let i = 0; i < n; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 5;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 2,
          life: 1,
          decay: 0.04 + Math.random() * 0.04,
          color,
          size: 3 + Math.random() * 4,
        });
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.3;
        p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // Attack hit detection — returns true if attacker hits target
    function checkHit(attacker, target) {
      if (!attacker.attacking || attacker.attackFrame !== 10) return false;
      const dist = Math.abs(attacker.x - target.x);
      return dist < 110;
    }

    // Punchy 3-phase weapon swing: windup → fast strike → recovery.
    function getArmAngle(s) {
      const t = s.attackFrame / ATTACK_FRAMES; // 0→1
      const sgn  = s.dir;                       // +1 right, -1 left
      const back = sgn * -2.7;                  // wound up behind head
      const fwd  = sgn *  1.0;                  // full follow-through in front
      const rest = sgn * -1.9;                  // neutral guard

      if (t < 0.28) {
        // Windup: pull the weapon a touch further back (anticipation)
        const k = t / 0.28;
        const eased = Math.sin(k * Math.PI / 2);   // ease-out
        return back + sgn * -0.35 * eased;
      } else if (t < 0.55) {
        // Strike: whip from back to forward, fast accelerating arc
        const k = (t - 0.28) / 0.27;
        const eased = k * k * (3 - 2 * k);         // smoothstep, snappy
        return (back + sgn * -0.35) + (fwd - (back + sgn * -0.35)) * eased;
      } else {
        // Recovery: settle from forward back to guard
        const k = (t - 0.55) / 0.45;
        const eased = k * k * (3 - 2 * k);
        return fwd + (rest - fwd) * eased;
      }
    }

    // Is this stickman in the fast strike window (for swoosh + lean)?
    function inStrike(s) {
      if (!s.attacking) return false;
      const t = s.attackFrame / ATTACK_FRAMES;
      return t >= 0.28 && t < 0.6;
    }

    function drawStickman(s) {
      const x = s.x;
      const glow = s.hitFlash > 0 ? '#FFFFFF' : (s.isPlayer ? '#FF2200' : '#0088FF');
      const color = s.isPlayer ? '#FF2200' : '#0088FF';

      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = 7;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.shadowColor = glow;
      ctx.shadowBlur = s.hitFlash > 0 ? 30 : 18;
      if (s.hitFlash > 0) ctx.strokeStyle = '#FFFFFF';

      // ---- Walk-cycle helpers ----
      const blend = s.walkBlend;
      const ph    = s.walkPhase;
      const bob   = Math.abs(Math.sin(ph)) * 3.5 * blend;   // vertical bounce
      const walkLean   = (s.moveDir || 0) * 4 * blend;       // lean into stride
      const strikeLean = inStrike(s) ? s.dir * 8 : 0;        // lunge on strike
      const lean  = walkLean + strikeLean;

      // ---- Measurements ----
      const feetY = s.y;                       // GROUND
      const hipsY = feetY - 65 - bob;
      const shouldersY = feetY - 135 - bob;
      const headCY = feetY - 162 - bob;
      const headR = 22;
      const hipX = x;                          // hips pivot at base x
      const shouldersX = x + lean;             // upper body leans
      const headX = x + lean * 1.3;            // head leads the lean

      // ---- Legs (animated walk cycle with knees) ----
      const stride = 14 * blend;
      const lSw = Math.sin(ph);
      const rSw = -lSw;
      const lFootX = x - 14 + lSw * stride;
      const rFootX = x + 14 + rSw * stride;
      const lFootY = feetY - Math.max(0, lSw) * 9 * blend;   // lift swinging foot
      const rFootY = feetY - Math.max(0, rSw) * 9 * blend;

      function drawLeg(hX, fX, fY) {
        const kneeX = (hX + fX) / 2 + s.dir * 2;
        const kneeY = (hipsY + fY) / 2 + 3;
        ctx.beginPath();
        ctx.moveTo(hX, hipsY);
        ctx.lineTo(kneeX, kneeY);
        ctx.lineTo(fX, fY);
        ctx.stroke();
      }
      drawLeg(hipX - 7, lFootX, lFootY);
      drawLeg(hipX + 7, rFootX, rFootY);

      // ---- Torso (leans from hips to shoulders) ----
      ctx.beginPath();
      ctx.moveTo(hipX, hipsY);
      ctx.lineTo(shouldersX, shouldersY);
      ctx.stroke();

      // ---- Head ----
      ctx.beginPath();
      ctx.arc(headX, headCY, headR, 0, Math.PI * 2);
      ctx.stroke();

      // ---- Face features ----
      ctx.save();
      ctx.shadowBlur = 0;
      ctx.lineWidth = 3;
      // Eyes
      const eyeOff = 8 * s.dir;
      ctx.beginPath();
      ctx.arc(headX + eyeOff, headCY - 5, 3, 0, Math.PI * 2);
      ctx.stroke();
      // Angry eyebrow
      ctx.beginPath();
      ctx.moveTo(headX + eyeOff - 6, headCY - 12);
      ctx.lineTo(headX + eyeOff + 5, headCY - 8);
      ctx.stroke();
      // Grimace mouth
      ctx.beginPath();
      ctx.moveTo(headX + 4 * s.dir - 7, headCY + 9);
      ctx.lineTo(headX + 4 * s.dir + 7, headCY + 9);
      ctx.stroke();
      // Teeth lines (grimace)
      for (let t = -4; t <= 4; t += 4) {
        ctx.beginPath();
        ctx.moveTo(headX + 4 * s.dir + t, headCY + 9);
        ctx.lineTo(headX + 4 * s.dir + t, headCY + 12);
        ctx.stroke();
      }
      ctx.restore();

      // ---- Resting arm (opposite to weapon arm) — swings opposite to legs when walking ----
      const restDir = -s.dir;
      const restSwing = Math.sin(ph + Math.PI) * 14 * blend;
      ctx.beginPath();
      ctx.moveTo(shouldersX, shouldersY);
      ctx.lineTo(shouldersX + restDir * 30 + restSwing, shouldersY + 32);
      ctx.stroke();

      // ---- Weapon arm (with swing animation) ----
      ctx.save();
      ctx.translate(shouldersX, shouldersY);
      // Idle weapon arm gets a gentle counter-swing while walking
      const idleArm = (s.dir === 1 ? -1.9 : 1.9) + Math.sin(ph) * 0.12 * blend;
      const armAngle = s.attacking ? getArmAngle(s) : idleArm;
      ctx.rotate(armAngle);

      // Draw upper arm (from shoulder)
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(0, 55);
      ctx.stroke();

      const handX = 0;
      const handY = 55;

      if (s.isPlayer) {
        // SWORD
        ctx.save();
        ctx.strokeStyle = s.hitFlash > 0 ? '#FFFFFF' : '#FF6633';
        ctx.shadowColor = s.hitFlash > 0 ? '#FFFFFF' : '#FF3D00';
        ctx.shadowBlur = 22;
        ctx.lineWidth = 4;
        // Blade
        ctx.beginPath();
        ctx.moveTo(handX, handY);
        ctx.lineTo(handX + 8, handY + 75);
        ctx.stroke();
        // Crossguard
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(handX - 14, handY + 20);
        ctx.lineTo(handX + 14, handY + 20);
        ctx.stroke();
        // Pommel
        ctx.beginPath();
        ctx.arc(handX + 1, handY - 4, 4, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      } else {
        // HAMMER (Mjolnir)
        ctx.save();
        ctx.strokeStyle = s.hitFlash > 0 ? '#FFFFFF' : '#33AAFF';
        ctx.fillStyle = s.hitFlash > 0 ? '#FFFFFF' : '#33AAFF';
        ctx.shadowColor = s.hitFlash > 0 ? '#FFFFFF' : '#0088FF';
        ctx.shadowBlur = 22;
        ctx.lineWidth = 4;
        // Handle
        ctx.beginPath();
        ctx.moveTo(handX, handY);
        ctx.lineTo(handX, handY + 45);
        ctx.stroke();
        // Hammer head (rect)
        ctx.lineWidth = 3;
        ctx.strokeRect(handX - 20, handY + 45, 40, 26);
        ctx.globalAlpha = 0.35;
        ctx.fillRect(handX - 20, handY + 45, 40, 26);
        ctx.globalAlpha = 1;
        // Strike line detail on head
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(handX - 20, handY + 55);
        ctx.lineTo(handX + 20, handY + 55);
        ctx.stroke();
        ctx.restore();
      }

      ctx.restore(); // end weapon arm group

      // ---- Swoosh arc trail during the strike window ----
      if (inStrike(s)) {
        const ult = s.isUltra;
        const wColor = ult ? '#FFD23D' : (s.isPlayer ? '#FF6633' : '#33AAFF');
        const trailFrames = ult ? 8 : 4;
        const radius = ult ? 110 : 95;
        const a0 = getArmAngle({ dir: s.dir, attacking: true, attackFrame: s.attackFrame - trailFrames });
        const a1 = getArmAngle(s);
        // Convert arm angle to a world swoosh centered on shoulder
        ctx.save();
        ctx.translate(shouldersX, shouldersY);
        ctx.strokeStyle = wColor;
        ctx.globalAlpha = ult ? 0.7 : 0.5;
        ctx.shadowColor = ult ? '#FF3D00' : wColor;
        ctx.shadowBlur = ult ? 30 : 18;
        ctx.lineWidth = ult ? 10 : 6;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.arc(0, 0, radius, a0 + Math.PI / 2, a1 + Math.PI / 2, a1 < a0);
        ctx.stroke();
        ctx.globalAlpha = ult ? 0.35 : 0.25;
        ctx.lineWidth = ult ? 22 : 12;
        ctx.beginPath();
        ctx.arc(0, 0, radius, a0 + Math.PI / 2, a1 + Math.PI / 2, a1 < a0);
        ctx.stroke();
        ctx.restore();
      }

      ctx.restore(); // end stickman
    }

    function drawHealthBar(x, y, health, color, label) {
      const bw = 200, bh = 22;

      // Label
      ctx.font = '600 13px Inter, sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.75)';
      ctx.textBaseline = 'bottom';
      ctx.fillText(label + ' — ' + Math.max(0, health) + ' HP', x, y - 5);

      // Background
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.strokeStyle = 'rgba(255,255,255,0.1)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(x, y, bw, bh, 4);
      ctx.fill();
      ctx.stroke();

      // Fill
      const fillW = (Math.max(0, health) / 100) * bw;
      if (fillW > 0) {
        ctx.save();
        ctx.shadowColor = color;
        ctx.shadowBlur = 12;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.roundRect(x, y, fillW, bh, 4);
        ctx.fill();
        ctx.restore();
      }

      // Danger pulse overlay when < 30
      if (health < 30 && health > 0) {
        const pulse = 0.3 + 0.3 * Math.abs(Math.sin(Date.now() * 0.006));
        ctx.save();
        ctx.globalAlpha = pulse;
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.roundRect(x, y, fillW, bh, 4);
        ctx.fill();
        ctx.restore();
      }
    }

    // ---- Snow system ----
    function spawnSnow() {
      if (map !== 'ice') return;
      if (snow.length < 120 && Math.random() < 0.4) {
        snow.push({ x: Math.random() * W, y: -8, r: 2 + Math.random() * 4,
          speed: 0.8 + Math.random() * 1.8, drift: (Math.random() - 0.5) * 0.6,
          opacity: 0.4 + Math.random() * 0.6 });
      }
      for (let i = snow.length - 1; i >= 0; i--) {
        const s = snow[i];
        s.y += s.speed; s.x += s.drift;
        if (s.y > H + 10) snow.splice(i, 1);
      }
    }

    function drawSnow() {
      for (const s of snow) {
        ctx.save();
        ctx.globalAlpha = s.opacity;
        ctx.fillStyle = '#E8F4FF';
        ctx.shadowColor = '#A8DFFF';
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // ---- Cactus drawing ----
    function drawCactus(cx, baseY, h) {
      ctx.save();
      ctx.strokeStyle = '#3A7A2A';
      ctx.fillStyle = '#2D6020';
      ctx.lineWidth = 0;
      const w = h * 0.18;
      // Main trunk
      ctx.fillRect(cx - w/2, baseY - h, w, h);
      // Left arm
      const lArmY = baseY - h * 0.6;
      ctx.fillRect(cx - w/2 - w*1.5, lArmY - h*0.25, w, h*0.3);
      ctx.fillRect(cx - w/2 - w*1.5, lArmY - h*0.25, w, h*0.25);
      // Left arm vertical
      ctx.fillRect(cx - w/2 - w*1.5, lArmY - h*0.45, w, h*0.22);
      // Right arm
      const rArmY = baseY - h * 0.45;
      ctx.fillRect(cx + w/2, rArmY - h*0.15, w*1.5, w);
      ctx.fillRect(cx + w/2 + w*1.5 - w, rArmY - h*0.35, w, h*0.22);
      // Spines (light green lines)
      ctx.strokeStyle = '#7DC96A';
      ctx.lineWidth = 1;
      for (let i = 0; i < 5; i++) {
        const sy = baseY - h * 0.15 - i * (h * 0.16);
        ctx.beginPath(); ctx.moveTo(cx - w/2 - 5, sy); ctx.lineTo(cx - w/2 - 12, sy - 4); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + w/2 + 5, sy); ctx.lineTo(cx + w/2 + 12, sy - 4); ctx.stroke();
      }
      ctx.restore();
    }

    // ---- Castle drawing (reusable: background silhouette & full map) ----
    // style: 'far' = distant silhouette, 'near' = detailed stone
    function drawCastle(cx, baseY, scale, style) {
      ctx.save();
      const far = style === 'far';
      const stone = far ? '#5A6B7A' : '#8A8170';
      const stoneDark = far ? '#46535F' : '#6E665859';
      const u = scale; // unit
      ctx.fillStyle = stone;
      ctx.strokeStyle = far ? '#3A4651' : '#5C5446';
      ctx.lineWidth = far ? 0 : 2;

      const wallW = 120 * u, wallH = 70 * u;
      const wallX = cx - wallW / 2, wallY = baseY - wallH;

      // Main wall
      ctx.fillRect(wallX, wallY, wallW, wallH);
      // Battlements on main wall
      const merlonW = 14 * u;
      for (let mx = wallX; mx < wallX + wallW - 2; mx += merlonW * 2) {
        ctx.fillRect(mx, wallY - 10 * u, merlonW, 10 * u);
      }

      // Towers (left, right, center taller)
      function tower(tx, tw, th) {
        const tY = baseY - th;
        ctx.fillRect(tx - tw / 2, tY, tw, th);
        // Battlements
        for (let mx = tx - tw / 2; mx < tx + tw / 2 - 1; mx += (tw / 3)) {
          ctx.fillRect(mx, tY - 9 * u, tw / 6, 9 * u);
        }
        // Conical roof
        ctx.save();
        ctx.fillStyle = far ? '#3E4A55' : '#7A3B2E';
        ctx.beginPath();
        ctx.moveTo(tx - tw / 2 - 4 * u, tY - 9 * u);
        ctx.lineTo(tx, tY - 9 * u - th * 0.5);
        ctx.lineTo(tx + tw / 2 + 4 * u, tY - 9 * u);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
        // Window
        if (!far) {
          ctx.save();
          ctx.fillStyle = '#2A2418';
          ctx.fillRect(tx - 4 * u, tY + th * 0.4, 8 * u, 14 * u);
          ctx.restore();
        }
      }
      tower(wallX, 34 * u, wallH + 28 * u);
      tower(wallX + wallW, 34 * u, wallH + 28 * u);
      tower(cx, 40 * u, wallH + 55 * u);

      // Gate (arched)
      if (!far) {
        ctx.fillStyle = '#2A2418';
        const gW = 34 * u, gH = 42 * u;
        ctx.beginPath();
        ctx.moveTo(cx - gW / 2, baseY);
        ctx.lineTo(cx - gW / 2, baseY - gH + gW / 2);
        ctx.arc(cx, baseY - gH + gW / 2, gW / 2, Math.PI, 0);
        ctx.lineTo(cx + gW / 2, baseY);
        ctx.closePath();
        ctx.fill();
        // Portcullis bars
        ctx.strokeStyle = '#5C5446';
        ctx.lineWidth = 2;
        for (let bx = cx - gW / 2 + 6 * u; bx < cx + gW / 2; bx += 8 * u) {
          ctx.beginPath(); ctx.moveTo(bx, baseY); ctx.lineTo(bx, baseY - gH + 4 * u); ctx.stroke();
        }
      } else {
        // distant gate hint
        ctx.fillStyle = '#2E3842';
        ctx.fillRect(cx - 12 * u, baseY - 30 * u, 24 * u, 30 * u);
      }

      // Brick lines on near walls
      if (!far) {
        ctx.strokeStyle = 'rgba(0,0,0,0.12)';
        ctx.lineWidth = 1;
        for (let by = wallY + 14 * u; by < baseY; by += 14 * u) {
          ctx.beginPath(); ctx.moveTo(wallX, by); ctx.lineTo(wallX + wallW, by); ctx.stroke();
        }
      }
      ctx.restore();
    }

    function drawBackground() {
      if (map === 'desert') {
        // Desert sky gradient
        const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
        skyGrad.addColorStop(0, '#1A0A00');
        skyGrad.addColorStop(0.5, '#3D1800');
        skyGrad.addColorStop(1, '#7A3500');
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, W, H);

        // Sun glow
        ctx.save();
        ctx.shadowColor = '#FF8C00';
        ctx.shadowBlur = 60;
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.arc(W * 0.78, 70, 38, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // Sand ground
        const sandGrad = ctx.createLinearGradient(0, GROUND, 0, H);
        sandGrad.addColorStop(0, '#C8873A');
        sandGrad.addColorStop(1, '#9A5F22');
        ctx.fillStyle = sandGrad;
        ctx.fillRect(0, GROUND, W, H - GROUND);

        // Cacti in background
        drawCactus(80,  GROUND, 110);
        drawCactus(230, GROUND, 75);
        drawCactus(580, GROUND, 130);
        drawCactus(730, GROUND, 85);
        drawCactus(860, GROUND, 95);

        // Ground line (sand-colored glow)
        ctx.save();
        ctx.strokeStyle = '#D4840A';
        ctx.lineWidth = 3;
        ctx.shadowColor = '#FF8C00';
        ctx.shadowBlur = 18;
        ctx.beginPath();
        ctx.moveTo(0, GROUND); ctx.lineTo(W, GROUND);
        ctx.stroke();
        ctx.restore();

        // Heat shimmer dots
        ctx.save();
        ctx.fillStyle = 'rgba(255,160,40,0.06)';
        for (let i = 0; i < 8; i++) {
          ctx.beginPath();
          ctx.ellipse(100 + i * 110, GROUND - 8, 40, 6, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();

      } else if (map === 'ice') {
        // Ice sky gradient
        const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
        skyGrad.addColorStop(0, '#04121F');
        skyGrad.addColorStop(0.6, '#0A2A40');
        skyGrad.addColorStop(1, '#0D3050');
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, W, H);

        // Aurora effect
        ctx.save();
        const auroraGrad = ctx.createLinearGradient(0, 0, W, 0);
        auroraGrad.addColorStop(0,   'rgba(0,255,180,0)');
        auroraGrad.addColorStop(0.3, 'rgba(0,220,180,0.07)');
        auroraGrad.addColorStop(0.5, 'rgba(80,120,255,0.10)');
        auroraGrad.addColorStop(0.7, 'rgba(160,80,255,0.07)');
        auroraGrad.addColorStop(1,   'rgba(0,255,180,0)');
        ctx.fillStyle = auroraGrad;
        ctx.fillRect(0, 0, W, H * 0.4);
        ctx.restore();

        // Ice/snow ground
        const iceGrad = ctx.createLinearGradient(0, GROUND, 0, H);
        iceGrad.addColorStop(0, '#B8DCF0');
        iceGrad.addColorStop(0.3, '#8ABFDC');
        iceGrad.addColorStop(1, '#5A90B0');
        ctx.fillStyle = iceGrad;
        ctx.fillRect(0, GROUND, W, H - GROUND);

        // Snow surface bumps
        ctx.save();
        ctx.fillStyle = '#D4EEFA';
        ctx.beginPath();
        ctx.moveTo(0, GROUND);
        for (let x = 0; x <= W; x += 40) {
          ctx.lineTo(x, GROUND - 6 - Math.sin(x * 0.05) * 5);
        }
        ctx.lineTo(W, GROUND); ctx.lineTo(0, GROUND);
        ctx.fill();
        ctx.restore();

        // Ice cracks on ground
        ctx.save();
        ctx.strokeStyle = 'rgba(150,220,255,0.35)';
        ctx.lineWidth = 1;
        [[150,GROUND+10,200,GROUND+30],[350,GROUND+5,380,GROUND+25],
         [550,GROUND+8,620,GROUND+20],[750,GROUND+12,800,GROUND+28]].forEach(([x1,y1,x2,y2]) => {
          ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
        });
        ctx.restore();

        // Ground line (ice blue glow)
        ctx.save();
        ctx.strokeStyle = '#5BC8FF';
        ctx.lineWidth = 3;
        ctx.shadowColor = '#A8DFFF';
        ctx.shadowBlur = 18;
        ctx.beginPath();
        ctx.moveTo(0, GROUND); ctx.lineTo(W, GROUND);
        ctx.stroke();
        ctx.restore();

        // Snow particles
        spawnSnow();
        drawSnow();

      } else if (map === 'grass') {
        // Bright day sky
        const skyGrad = ctx.createLinearGradient(0, 0, 0, GROUND);
        skyGrad.addColorStop(0, '#4FA8E0');
        skyGrad.addColorStop(1, '#BDE4F2');
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, W, GROUND);

        // Sun
        ctx.save();
        ctx.shadowColor = '#FFF3B0';
        ctx.shadowBlur = 50;
        ctx.fillStyle = '#FFF6C2';
        ctx.beginPath();
        ctx.arc(W * 0.16, 80, 34, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // Clouds
        ctx.save();
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        function cloud(cx, cy, s) {
          ctx.beginPath();
          ctx.arc(cx, cy, 18*s, 0, Math.PI*2);
          ctx.arc(cx+22*s, cy+4*s, 22*s, 0, Math.PI*2);
          ctx.arc(cx+48*s, cy, 16*s, 0, Math.PI*2);
          ctx.arc(cx+24*s, cy-10*s, 16*s, 0, Math.PI*2);
          ctx.fill();
        }
        cloud(W*0.55, 70, 1); cloud(W*0.8, 120, 0.7); cloud(W*0.33, 130, 0.55);
        ctx.restore();

        // Distant hills
        ctx.save();
        ctx.fillStyle = '#6FB24A';
        ctx.beginPath();
        ctx.moveTo(0, GROUND);
        for (let x = 0; x <= W; x += 30) ctx.lineTo(x, GROUND - 50 - Math.sin(x*0.012)*30 - Math.cos(x*0.03)*12);
        ctx.lineTo(W, GROUND); ctx.fill();
        ctx.restore();

        // Castle from the castle map, in the background on a hill
        drawCastle(W * 0.72, GROUND - 40, 0.85, 'far');

        // Grass ground
        const grassGrad = ctx.createLinearGradient(0, GROUND, 0, H);
        grassGrad.addColorStop(0, '#5FB23E');
        grassGrad.addColorStop(1, '#3C7A26');
        ctx.fillStyle = grassGrad;
        ctx.fillRect(0, GROUND, W, H - GROUND);

        // Grass blades along the ground line
        ctx.save();
        ctx.strokeStyle = '#7DD45A';
        ctx.lineWidth = 2;
        for (let gx = 0; gx <= W; gx += 11) {
          const gh = 8 + Math.sin(gx * 0.7) * 4;
          ctx.beginPath();
          ctx.moveTo(gx, GROUND);
          ctx.lineTo(gx + 3, GROUND - gh);
          ctx.stroke();
        }
        ctx.restore();

        // Small flowers
        ctx.save();
        [[120,'#FF5BA0'],[300,'#FFD23D'],[470,'#FF5BA0'],[640,'#FFFFFF'],[800,'#FFD23D']].forEach(([fx,fc]) => {
          ctx.fillStyle = fc;
          for (let p = 0; p < 5; p++) {
            const a = p / 5 * Math.PI * 2;
            ctx.beginPath();
            ctx.arc(fx + Math.cos(a)*3, GROUND + 8 + Math.sin(a)*3, 2.2, 0, Math.PI*2);
            ctx.fill();
          }
          ctx.fillStyle = '#FFB300';
          ctx.beginPath(); ctx.arc(fx, GROUND + 8, 2, 0, Math.PI*2); ctx.fill();
        });
        ctx.restore();

        // Ground line (green glow)
        ctx.save();
        ctx.strokeStyle = '#9BE86A';
        ctx.lineWidth = 3;
        ctx.shadowColor = '#7DD45A';
        ctx.shadowBlur = 14;
        ctx.beginPath();
        ctx.moveTo(0, GROUND); ctx.lineTo(W, GROUND);
        ctx.stroke();
        ctx.restore();

      } else if (map === 'castle') {
        // Dusk sky behind the castle
        const skyGrad = ctx.createLinearGradient(0, 0, 0, GROUND);
        skyGrad.addColorStop(0, '#1B1430');
        skyGrad.addColorStop(0.6, '#3A2848');
        skyGrad.addColorStop(1, '#6B3A4A');
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, W, GROUND);

        // Moon
        ctx.save();
        ctx.shadowColor = '#FFF8E0';
        ctx.shadowBlur = 40;
        ctx.fillStyle = '#F5EFD0';
        ctx.beginPath();
        ctx.arc(W * 0.82, 75, 28, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // Big detailed castle filling the background
        drawCastle(W * 0.5, GROUND, 1.35, 'near');

        // Stone courtyard ground
        const stoneGrad = ctx.createLinearGradient(0, GROUND, 0, H);
        stoneGrad.addColorStop(0, '#8A8170');
        stoneGrad.addColorStop(1, '#5C5446');
        ctx.fillStyle = stoneGrad;
        ctx.fillRect(0, GROUND, W, H - GROUND);

        // Cobblestone lines
        ctx.save();
        ctx.strokeStyle = 'rgba(0,0,0,0.18)';
        ctx.lineWidth = 1;
        for (let cy = GROUND + 14; cy < H; cy += 16) {
          ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(W, cy); ctx.stroke();
        }
        for (let cx = 0; cx <= W; cx += 40) {
          ctx.beginPath(); ctx.moveTo(cx, GROUND); ctx.lineTo(cx + 8, H); ctx.stroke();
        }
        ctx.restore();

        // Wall torches with flickering flame
        ctx.save();
        [W * 0.12, W * 0.88].forEach((tx) => {
          // Bracket
          ctx.fillStyle = '#3A2E20';
          ctx.fillRect(tx - 3, GROUND - 130, 6, 40);
          // Flame
          const flick = 0.7 + Math.abs(Math.sin(Date.now() * 0.012 + tx)) * 0.5;
          ctx.shadowColor = '#FF8C00';
          ctx.shadowBlur = 30 * flick;
          ctx.fillStyle = '#FFB02E';
          ctx.beginPath();
          ctx.ellipse(tx, GROUND - 138, 7, 14 * flick, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#FFE07A';
          ctx.beginPath();
          ctx.ellipse(tx, GROUND - 136, 3.5, 8 * flick, 0, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.restore();

        // Ground line (warm stone glow)
        ctx.save();
        ctx.strokeStyle = '#C2A86A';
        ctx.lineWidth = 3;
        ctx.shadowColor = '#FF8C00';
        ctx.shadowBlur = 16;
        ctx.beginPath();
        ctx.moveTo(0, GROUND); ctx.lineTo(W, GROUND);
        ctx.stroke();
        ctx.restore();

      } else {
        // Default dark bg (shown behind menus)
        const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
        skyGrad.addColorStop(0, '#050505');
        skyGrad.addColorStop(1, '#0D0812');
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, W, H);
        ctx.save();
        ctx.strokeStyle = '#FF3D00';
        ctx.lineWidth = 3;
        ctx.shadowColor = '#FF3D00';
        ctx.shadowBlur = 20;
        ctx.beginPath();
        ctx.moveTo(0, GROUND); ctx.lineTo(W, GROUND);
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawUI() {
      if (mode === 'soccer') {
        // Scoreboard
        ctx.save();
        ctx.textBaseline = 'top';
        // P1 (red)
        ctx.font = '600 14px Inter, sans-serif';
        ctx.fillStyle = '#FF6644';
        ctx.textAlign = 'left';
        ctx.fillText('SPIELER 1', 24, 16);
        // P2 (blue)
        ctx.fillStyle = '#5BA8FF';
        ctx.textAlign = 'right';
        ctx.fillText('SPIELER 2', W - 24, 16);
        // Scores
        ctx.font = 'bold 46px Bangers, cursive';
        ctx.shadowColor = '#FF3D00'; ctx.shadowBlur = 14;
        ctx.fillStyle = '#FFFFFF';
        ctx.textAlign = 'left';
        ctx.fillText(score.p1, 24, 32);
        ctx.textAlign = 'right';
        ctx.fillText(score.p2, W - 24, 32);
        // Target
        ctx.shadowBlur = 0;
        ctx.font = '600 13px Inter, sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.textAlign = 'center';
        ctx.fillText('ERSTER ZU ' + GOALS_TO_WIN + ' TOREN GEWINNT', W / 2, 22);
        ctx.restore();

        // Controls hint
        ctx.save();
        ctx.font = '12px Inter, sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.28)';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText('S1: A/D + S-Sprung + LEERTASTE-Schuss   |   S2: ←/→ + ↑-Sprung + ENTER-Schuss   |   Z = Menü', W / 2, H - 8);
        ctx.restore();
        return;
      }

      // Player 1 health bar (left)
      drawHealthBar(18, 20, player.hp, '#FF2200', 'SPIELER 1');

      // Opponent health bar (right-aligned)
      drawHealthBar(W - 218, 20, ai.hp, '#0088FF', mode === 'pvp' ? 'SPIELER 2' : 'KI');

      // Controls hint
      ctx.save();
      ctx.font = '12px Inter, sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.28)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      const hint = mode === 'pvp'
        ? 'S1: A/D + S-Sprung + LEERTASTE (A+D=ULTRA⚡)   |   S2: ←/→ + ↑-Sprung + ENTER (←+→=ULTRA⚡)   |   Z = Menü'
        : 'A / D — Bewegen   |   S — Springen   |   LEERTASTE — Angriff   |   A+D = ULTRA ⚡   |   Z = Menü';
      ctx.fillText(hint, W / 2, H - 8);
      ctx.restore();
    }

    function drawGameOver() {
      // Dim overlay
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.65)';
      ctx.fillRect(0, 0, W, H);

      // Win text
      let mainText;
      if (mode === 'pvp' || mode === 'soccer') {
        mainText = winner === 'player' ? 'SPIELER 1 GEWINNT! 🏆' : 'SPIELER 2 GEWINNT! 🏆';
      } else {
        mainText = winner === 'player' ? 'DU HAST GEWONNEN! 🏆' : 'KI GEWINNT! 💀';
      }
      ctx.font = 'bold 58px Bangers, cursive';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = '#FF3D00';
      ctx.shadowBlur = 40;
      ctx.fillStyle = '#FF3D00';
      ctx.fillText(mainText, W / 2, H / 2 - 30);

      let subY = H / 2 + 28;
      if (mode === 'soccer') {
        ctx.font = '32px Bangers, cursive';
        ctx.shadowBlur = 12;
        ctx.fillStyle = '#FFD23D';
        ctx.fillText('⚽ ' + score.p1 + ' : ' + score.p2 + ' ⚽', W / 2, H / 2 + 20);
        subY = H / 2 + 58;
      }

      ctx.font = '22px Bangers, cursive';
      ctx.shadowBlur = 10;
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.fillText('Neue Runde startet...', W / 2, subY);

      ctx.restore();
    }

    function updatePlayer() {
      player.moving = false;
      const left  = keys['a'] || keys['A'];
      const right = keys['d'] || keys['D'];
      const both  = left && right;

      if (!both) {
        if (left)  { player.x -= PLAYER_SPEED; player.moving = true; player.moveDir = -1; }
        if (right) { player.x += PLAYER_SPEED; player.moving = true; player.moveDir = 1; }
      }

      // Jump (S)
      if ((keys['s'] || keys['S']) && player.onGround) {
        player.vy = JUMP_FORCE;
        player.onGround = false;
      }

      // Gravity & vertical position
      player.vy += GRAVITY;
      player.y += player.vy;
      if (player.y >= GROUND) {
        player.y = GROUND;
        player.vy = 0;
        player.onGround = true;
      }

      // Clamp
      player.x = Math.max(30, Math.min(W - 30, player.x));

      // Face direction toward AI
      player.dir = ai.x > player.x ? 1 : -1;

      // ULTRA attack: A + D together
      if (both && !player.attacking && player.cooldown === 0) {
        player.attacking = true;
        player.attackFrame = 0;
        player.isUltra = true;
        player.ultraFlash = 45;
      }
      // Normal attack
      else if (keys[' '] && !player.attacking && player.cooldown === 0) {
        player.attacking = true;
        player.attackFrame = 0;
        player.isUltra = false;
      }

      if (player.attacking) {
        player.attackFrame++;
        if (player.attackFrame >= ATTACK_FRAMES) {
          player.attacking = false;
          player.attackFrame = 0;
          player.cooldown = player.isUltra ? ULTRA_COOLDOWN : PLAYER_COOLDOWN;
          player.isUltra = false;
        }
      }
      if (player.ultraFlash > 0) player.ultraFlash--;

      if (player.cooldown > 0) player.cooldown--;

      // Hit flash
      if (player.hitFlash > 0) player.hitFlash--;

      // Knockback
      if (player.knockback > 0) {
        player.x += player.knockbackDir * 3;
        player.knockback--;
      }
    }

    function updateAI() {
      const dist = ai.x - player.x;
      const absDist = Math.abs(dist);
      ai.moving = false;

      // Face player
      ai.dir = player.x < ai.x ? -1 : 1;

      // Knockback
      if (ai.knockback > 0) {
        ai.x += ai.knockbackDir * 3;
        ai.knockback--;
        ai.x = Math.max(30, Math.min(W - 30, ai.x));
        if (ai.attacking) { ai.attacking = false; ai.attackFrame = 0; }
        return;
      }

      // State machine
      if (ai.aiState === 'chase') {
        if (absDist > 90) {
          const d = dist > 0 ? -1 : 1;
          ai.x += d * AI_SPEED;
          ai.moving = true; ai.moveDir = d;
        } else {
          ai.aiState = 'attack';
        }
      } else if (ai.aiState === 'attack') {
        if (ai.cooldown === 0 && !ai.attacking && absDist < 110) {
          ai.attacking = true;
          ai.attackFrame = 0;
        }
        // Back off occasionally when cooldown active and too close
        if (ai.cooldown > 40 && absDist < 60) {
          ai.aiState = 'backoff';
          ai.aiBackTimer = 25 + Math.floor(Math.random() * 20);
        }
        if (absDist > 130) ai.aiState = 'chase';
      } else if (ai.aiState === 'backoff') {
        const backDir = dist > 0 ? 1 : -1; // move away from player
        ai.x += backDir * AI_SPEED * 1.2;
        ai.moving = true; ai.moveDir = backDir;
        ai.aiBackTimer--;
        if (ai.aiBackTimer <= 0) ai.aiState = 'chase';
      }

      ai.x = Math.max(30, Math.min(W - 30, ai.x));

      // Gravity (AI stays on ground)
      ai.vy += GRAVITY;
      ai.y += ai.vy;
      if (ai.y >= GROUND) { ai.y = GROUND; ai.vy = 0; ai.onGround = true; }

      // Attack animation
      if (ai.attacking) {
        ai.attackFrame++;
        if (ai.attackFrame >= ATTACK_FRAMES) {
          ai.attacking = false;
          ai.attackFrame = 0;
          ai.cooldown = AI_COOLDOWN;
          // After cooldown reset, return to chase
          ai.aiState = 'chase';
        }
      }

      if (ai.cooldown > 0) ai.cooldown--;
      if (ai.hitFlash > 0) ai.hitFlash--;
    }

    function updatePlayer2() {
      // Player 2 controls the blue stickman: ←=left, →=right, Enter=attack, ←+→=ultra, ↑=jump
      ai.moving = false;
      const left  = keys['ArrowLeft'];
      const right = keys['ArrowRight'];
      const both  = left && right;

      if (!both) {
        if (left)  { ai.x -= PLAYER_SPEED; ai.moving = true; ai.moveDir = -1; }
        if (right) { ai.x += PLAYER_SPEED; ai.moving = true; ai.moveDir = 1; }
      }

      // Jump (ArrowUp)
      if (keys['ArrowUp'] && ai.onGround) {
        ai.vy = JUMP_FORCE;
        ai.onGround = false;
      }

      // Gravity & vertical position
      ai.vy += GRAVITY;
      ai.y += ai.vy;
      if (ai.y >= GROUND) {
        ai.y = GROUND;
        ai.vy = 0;
        ai.onGround = true;
      }

      ai.x = Math.max(30, Math.min(W - 30, ai.x));

      // Face player 1
      ai.dir = player.x < ai.x ? -1 : 1;

      // ULTRA attack: K + Ö together
      if (both && !ai.attacking && ai.cooldown === 0) {
        ai.attacking = true;
        ai.attackFrame = 0;
        ai.isUltra = true;
        ai.ultraFlash = 45;
      }
      // Normal attack
      else if (keys['Enter'] && !ai.attacking && ai.cooldown === 0) {
        ai.attacking = true;
        ai.attackFrame = 0;
        ai.isUltra = false;
      }

      if (ai.attacking) {
        ai.attackFrame++;
        if (ai.attackFrame >= ATTACK_FRAMES) {
          ai.attacking = false;
          ai.attackFrame = 0;
          ai.cooldown = ai.isUltra ? ULTRA_COOLDOWN : PLAYER_COOLDOWN;
          ai.isUltra = false;
        }
      }
      if (ai.ultraFlash > 0) ai.ultraFlash--;

      if (ai.cooldown > 0) ai.cooldown--;
      if (ai.hitFlash > 0) ai.hitFlash--;

      // Knockback
      if (ai.knockback > 0) {
        ai.x += ai.knockbackDir * 3;
        ai.knockback--;
        ai.x = Math.max(30, Math.min(W - 30, ai.x));
      }
    }

    function resolveHits() {
      // Player hits AI
      if (checkHit(player, ai)) {
        const ult = player.isUltra;
        ai.hp -= ult ? ULTRA_DAMAGE : HIT_DAMAGE;
        ai.hitFlash = ult ? 18 : 10;
        ai.knockback = ult ? 18 : 8;
        ai.knockbackDir = player.dir;
        // Interrupt AI attack
        if (ai.attacking) { ai.attacking = false; ai.attackFrame = 0; }
        spawnParticles(ai.x, GROUND - 80, ult ? '#FFD23D' : '#0088FF', ult ? 36 : 14);
        if (ult) { shake = 16; spawnParticles(ai.x, GROUND - 80, '#FF3D00', 20); }
      }

      // AI / Player 2 hits player
      if (checkHit(ai, player)) {
        const ult = ai.isUltra;
        player.hp -= ult ? ULTRA_DAMAGE : HIT_DAMAGE;
        player.hitFlash = ult ? 18 : 10;
        player.knockback = ult ? 18 : 8;
        player.knockbackDir = ai.dir;
        if (player.attacking) { player.attacking = false; player.attackFrame = 0; }
        spawnParticles(player.x, GROUND - 80, ult ? '#FFD23D' : '#FF2200', ult ? 36 : 14);
        if (ult) { shake = 16; spawnParticles(player.x, GROUND - 80, '#FF3D00', 20); }
      }
    }

    // ===== Soccer logic =====
    function updateBall() {
      ball.vy += 0.45;                 // gravity
      ball.x += ball.vx;
      ball.y += ball.vy;
      ball.rot += ball.vx * 0.05;
      ball.vx *= 0.995;                // air drag

      // Ground bounce
      if (ball.y + ball.r > GROUND) {
        ball.y = GROUND - ball.r;
        ball.vy *= -0.55;
        ball.vx *= 0.9;                // rolling friction
        if (Math.abs(ball.vy) < 1) ball.vy = 0;
      }
      // Ceiling
      if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy *= -0.5; }

      // Side walls — only bounce ABOVE the goal mouth; goal-height balls fly in
      const inGoalH = ball.y > GROUND - GOAL_HEIGHT;
      if (!inGoalH) {
        if (ball.x - ball.r < 0)  { ball.x = ball.r; ball.vx = Math.abs(ball.vx) * 0.7; }
        if (ball.x + ball.r > W)  { ball.x = W - ball.r; ball.vx = -Math.abs(ball.vx) * 0.7; }
      }
    }

    function kickBall(s) {
      const dx = ball.x - s.x;
      const bodyTop = GROUND - 175;
      if (Math.abs(dx) < ball.r + 20 && ball.y > bodyTop && ball.y < GROUND + 6) {
        const dir = dx >= 0 ? 1 : -1;
        let power = 4 + Math.abs(s.moveDir || 0) * 2;
        let lift = 2.5;
        if (s.attacking) {
          const t = s.attackFrame / ATTACK_FRAMES;
          if (t > 0.25 && t < 0.6) {                 // during the swing strike
            power = s.isUltra ? 17 : 11;
            lift  = s.isUltra ? 10 : 6;
            spawnParticles(ball.x, ball.y, s.isUltra ? '#FFD23D' : (s.isPlayer ? '#FF6633' : '#33AAFF'), s.isUltra ? 18 : 10);
          }
        }
        ball.vx = dir * power + (s.moveDir || 0) * 1.5;
        ball.vy = -lift;
        ball.x = s.x + dir * (ball.r + 21);           // unstick
      }
    }

    function checkGoal() {
      const inH = ball.y > GROUND - GOAL_HEIGHT;
      if (!inH) return;
      if (ball.x - ball.r <= GOAL_DEPTH) { onGoal(2); }            // left goal → P2 scores
      else if (ball.x + ball.r >= W - GOAL_DEPTH) { onGoal(1); }   // right goal → P1 scores
    }

    function onGoal(scorer) {
      if (scorer === 1) score.p1++; else score.p2++;
      goalFlash = 90;
      shake = 16;
      spawnParticles(ball.x, ball.y, '#FFD23D', 44);
      spawnParticles(ball.x, ball.y, '#FFFFFF', 22);
      if (score.p1 >= GOALS_TO_WIN || score.p2 >= GOALS_TO_WIN) {
        gameOver = true;
        gameOverTimer = 180;
        winner = score.p1 > score.p2 ? 'player' : 'ai';
      } else {
        resetBall(scorer === 1 ? -1 : 1);             // kickoff toward the side that conceded
      }
    }

    function updateSoccer() {
      updatePlayer();
      updatePlayer2();
      stepWalk(player);
      stepWalk(ai);
      updateBall();
      kickBall(player);
      kickBall(ai);
      checkGoal();
      if (goalFlash > 0) goalFlash--;
    }

    function update() {
      if (gameOver) {
        gameOverTimer--;
        if (gameOverTimer <= 0) {
          init();
        }
        return;
      }

      if (mode === 'soccer') {
        updateSoccer();
        updateParticles();
        if (shake > 0) shake *= 0.85;
        if (shake < 0.3) shake = 0;
        return;
      }

      updatePlayer();
      if (mode === 'pvp') updatePlayer2();
      else updateAI();
      stepWalk(player);
      stepWalk(ai);
      resolveHits();
      updateParticles();
      if (shake > 0) shake *= 0.85;
      if (shake < 0.3) shake = 0;

      // Check win conditions
      if (player.hp <= 0 || ai.hp <= 0) {
        gameOver = true;
        gameOverTimer = 150; // ~2.5s at 60fps
        winner = ai.hp <= 0 ? 'player' : 'ai';
      }
    }

    function drawGoal(side) {
      const x = side < 0 ? 0 : W - GOAL_DEPTH;
      const topY = GROUND - GOAL_HEIGHT;
      ctx.save();
      // Glowing frame
      ctx.strokeStyle = '#FFFFFF';
      ctx.shadowColor = side < 0 ? '#FF2200' : '#0088FF';
      ctx.shadowBlur = 16;
      ctx.lineWidth = 5;
      ctx.strokeRect(x, topY, GOAL_DEPTH, GOAL_HEIGHT);
      // Net mesh
      ctx.shadowBlur = 0;
      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.lineWidth = 1;
      for (let gx = x; gx <= x + GOAL_DEPTH; gx += 7) {
        ctx.beginPath(); ctx.moveTo(gx, topY); ctx.lineTo(gx, GROUND); ctx.stroke();
      }
      for (let gy = topY; gy <= GROUND; gy += 7) {
        ctx.beginPath(); ctx.moveTo(x, gy); ctx.lineTo(x + GOAL_DEPTH, gy); ctx.stroke();
      }
      ctx.restore();
    }

    function drawBall() {
      if (!ball) return;
      // Ground shadow
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      const sc = Math.max(0.3, 1 - (GROUND - ball.y) / 400);
      ctx.beginPath();
      ctx.ellipse(ball.x, GROUND - 2, ball.r * sc, 5 * sc, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      ctx.save();
      ctx.translate(ball.x, ball.y);
      ctx.rotate(ball.rot);
      ctx.shadowColor = '#FFD23D';
      ctx.shadowBlur = 14;
      // White ball
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      ctx.arc(0, 0, ball.r, 0, Math.PI * 2);
      ctx.fill();
      // Classic black pentagons
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#141414';
      ctx.beginPath();
      ctx.arc(0, 0, ball.r * 0.42, 0, Math.PI * 2);
      ctx.fill();
      for (let i = 0; i < 5; i++) {
        const a = i / 5 * Math.PI * 2;
        ctx.beginPath();
        ctx.arc(Math.cos(a) * ball.r * 0.72, Math.sin(a) * ball.r * 0.72, ball.r * 0.16, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      ctx.save();
      if (shake > 0) {
        ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
      }
      drawBackground();
      if (mode === 'soccer') { drawGoal(-1); drawGoal(1); }
      drawParticles();
      drawStickman(player);
      drawStickman(ai);
      if (mode === 'soccer') drawBall();
      ctx.restore();
      drawUI();
      drawUltraBanner(player);
      drawUltraBanner(ai);
      if (mode === 'soccer' && goalFlash > 0 && !gameOver) drawGoalBanner();
      if (gameOver) drawGameOver();
    }

    function drawGoalBanner() {
      const alpha = Math.min(1, goalFlash / 30);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.font = 'bold 70px Bangers, cursive';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#FFD23D';
      ctx.shadowColor = '#FF3D00';
      ctx.shadowBlur = 40;
      ctx.fillText('⚽ TOOOR! ⚽', W / 2, H / 2 - 30);
      ctx.restore();
    }

    function drawUltraBanner(s) {
      if (s.ultraFlash <= 0) return;
      const alpha = Math.min(1, s.ultraFlash / 20);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.font = 'bold 30px Bangers, cursive';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#FFD23D';
      ctx.shadowColor = '#FF3D00';
      ctx.shadowBlur = 24;
      const yOff = (45 - s.ultraFlash) * 0.8;
      ctx.fillText('⚡ ULTRA! ⚡', s.x, GROUND - 200 - yOff);
      ctx.restore();
    }

    function gameLoop() {
      if (started) {
        update();
        draw();
      } else {
        // Idle background behind the menu
        drawBackground();
      }
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  })();
  </script>
</body>
