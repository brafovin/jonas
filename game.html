<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stickman Fight Legacy</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0A0A0A;
      color: #fff;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px 8px 24px;
      user-select: none;
    }

    #back-btn {
      align-self: flex-start;
      color: #FF3D00;
      text-decoration: none;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 0.04em;
      padding: 6px 0;
      margin-bottom: 8px;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    #back-btn:hover { opacity: 0.7; }

    #game-title {
      font-family: 'Bangers', cursive;
      font-size: clamp(28px, 6vw, 52px);
      color: #FF3D00;
      letter-spacing: 0.08em;
      text-shadow: 0 0 20px rgba(255,61,0,0.6), 0 0 40px rgba(255,61,0,0.3);
      margin-bottom: 14px;
      text-align: center;
    }

    #canvas-wrapper {
      position: relative;
      width: 100%;
      max-width: 900px;
    }

    #game {
      display: block;
      width: 100%;
      max-width: 900px;
      height: auto;
      border: 1px solid rgba(255,61,0,0.25);
      box-shadow: 0 0 40px rgba(255,61,0,0.15), 0 0 80px rgba(255,61,0,0.07);
    }

    #touch-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 900px;
      margin-top: 16px;
      padding: 0 8px;
      gap: 8px;
    }

    .touch-group {
      display: flex;
      gap: 10px;
    }

    .touch-btn {
      background: rgba(255,255,255,0.04);
      border: 2px solid #FF3D00;
      color: #FF3D00;
      font-family: 'Bangers', cursive;
      font-size: 22px;
      letter-spacing: 0.06em;
      width: 70px;
      height: 70px;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 12px rgba(255,61,0,0.2);
      transition: background 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

    .touch-btn:active,
    .touch-btn.pressed {
      background: rgba(255,61,0,0.18);
      box-shadow: 0 0 24px rgba(255,61,0,0.5);
    }

    #touch-attack {
      width: 90px;
      height: 70px;
      font-size: 18px;
      background: rgba(255,61,0,0.08);
    }

    @media (min-width: 700px) {
      #touch-controls { display: none; }
    }
  </style>
</head>
<body>
  <a id="back-btn" href="index.html">&#8592; Zur&uuml;ck</a>
  <div id="game-title">STICKMAN FIGHT LEGACY</div>

  <div id="canvas-wrapper">
    <canvas id="game" width="900" height="500"></canvas>
  </div>

  <div id="touch-controls">
    <div class="touch-group">
      <button class="touch-btn" id="touch-left">&#9664;</button>
      <button class="touch-btn" id="touch-right">&#9654;</button>
    </div>
    <button class="touch-btn" id="touch-attack">ATTACK</button>
  </div>

  <script>
  (function() {
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const W = 900, H = 500;
    const GROUND = 420;
    const PLAYER_SPEED = 4;
    const AI_SPEED = 2.5;
    const HIT_DAMAGE = 10;
    const PLAYER_COOLDOWN = 45;
    const AI_COOLDOWN = 80;
    const ATTACK_FRAMES = 20;

    const keys = {};
    document.addEventListener('keydown', e => { keys[e.key] = true; });
    document.addEventListener('keyup', e => { keys[e.key] = false; });

    // Touch controls
    function bindTouch(id, key) {
      const el = document.getElementById(id);
      if (!el) return;
      const press = (e) => { e.preventDefault(); keys[key] = true; el.classList.add('pressed'); };
      const release = (e) => { e.preventDefault(); keys[key] = false; el.classList.remove('pressed'); };
      el.addEventListener('touchstart', press, { passive: false });
      el.addEventListener('touchend', release, { passive: false });
      el.addEventListener('touchcancel', release, { passive: false });
      el.addEventListener('mousedown', press);
      el.addEventListener('mouseup', release);
      el.addEventListener('mouseleave', release);
    }
    bindTouch('touch-left', 'a');
    bindTouch('touch-right', 'd');
    bindTouch('touch-attack', ' ');

    let player, ai, gameOver, gameOverTimer, winner;
    let particles = [];

    function createStickman(x, isPlayer) {
      return {
        x, y: GROUND,
        isPlayer,
        hp: 100,
        dir: isPlayer ? 1 : -1,
        attacking: false,
        attackFrame: 0,
        cooldown: 0,
        hit: false, hitFlash: 0,
        aiState: 'chase',
        aiBackTimer: 0,
        knockback: 0,
        knockbackDir: 0,
      };
    }

    function init() {
      player = createStickman(150, true);
      ai = createStickman(750, false);
      gameOver = false;
      gameOverTimer = 0;
      winner = null;
      particles = [];
    }

    // Particle system for hit effects
    function spawnParticles(x, y, color) {
      for (let i = 0; i < 14; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 5;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 2,
          life: 1,
          decay: 0.04 + Math.random() * 0.04,
          color,
          size: 3 + Math.random() * 4,
        });
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.3;
        p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // Attack hit detection — returns true if attacker hits target
    function checkHit(attacker, target) {
      if (!attacker.attacking || attacker.attackFrame !== 10) return false;
      const dist = Math.abs(attacker.x - target.x);
      return dist < 110;
    }

    // Arm angles for attack animation
    // dir=1 (facing right): rest behind = -2.2rad, forward = 0.4rad
    // dir=-1 (facing left): rest behind = 2.2rad, forward = -0.4rad
    function getArmAngle(s) {
      const t = s.attackFrame / ATTACK_FRAMES; // 0→1
      // swing from behind to forward with overshoot, then back
      let progress;
      if (t <= 0.5) {
        progress = t * 2; // 0 → 1 (swing forward)
      } else {
        progress = 1 - (t - 0.5) * 2 * 0.6; // return partway
      }
      // ease
      const eased = progress < 0.5
        ? 2 * progress * progress
        : 1 - Math.pow(-2 * progress + 2, 2) / 2;

      const startAngle = s.dir === 1 ? -2.4 : 2.4;
      const endAngle = s.dir === 1 ? 0.5 : -0.5;
      return startAngle + (endAngle - startAngle) * eased;
    }

    function drawStickman(s) {
      const x = s.x;
      const glow = s.hitFlash > 0 ? '#FFFFFF' : (s.isPlayer ? '#FF2200' : '#0088FF');
      const color = s.isPlayer ? '#FF2200' : '#0088FF';

      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = 7;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.shadowColor = glow;
      ctx.shadowBlur = s.hitFlash > 0 ? 30 : 18;
      if (s.hitFlash > 0) ctx.strokeStyle = '#FFFFFF';

      // ---- Measurements ----
      const feetY = s.y;                // GROUND
      const hipsY = feetY - 65;
      const shouldersY = feetY - 135;
      const headCY = feetY - 162;
      const headR = 22;

      // ---- Legs ----
      // Left leg
      ctx.beginPath();
      ctx.moveTo(x - 14, hipsY);
      ctx.lineTo(x - 22, feetY);
      ctx.stroke();
      // Right leg
      ctx.beginPath();
      ctx.moveTo(x + 14, hipsY);
      ctx.lineTo(x + 22, feetY);
      ctx.stroke();

      // ---- Torso ----
      ctx.beginPath();
      ctx.moveTo(x, hipsY);
      ctx.lineTo(x, shouldersY);
      ctx.stroke();

      // ---- Head ----
      ctx.beginPath();
      ctx.arc(x, headCY, headR, 0, Math.PI * 2);
      ctx.stroke();

      // ---- Face features ----
      ctx.save();
      ctx.shadowBlur = 0;
      ctx.lineWidth = 3;
      // Eyes
      const eyeOff = 8 * s.dir;
      ctx.beginPath();
      ctx.arc(x + eyeOff, headCY - 5, 3, 0, Math.PI * 2);
      ctx.stroke();
      // Angry eyebrow
      ctx.beginPath();
      ctx.moveTo(x + eyeOff - 6, headCY - 12);
      ctx.lineTo(x + eyeOff + 5, headCY - 8);
      ctx.stroke();
      // Grimace mouth
      ctx.beginPath();
      ctx.moveTo(x + 4 * s.dir - 7, headCY + 9);
      ctx.lineTo(x + 4 * s.dir + 7, headCY + 9);
      ctx.stroke();
      // Teeth lines (grimace)
      for (let t = -4; t <= 4; t += 4) {
        ctx.beginPath();
        ctx.moveTo(x + 4 * s.dir + t, headCY + 9);
        ctx.lineTo(x + 4 * s.dir + t, headCY + 12);
        ctx.stroke();
      }
      ctx.restore();

      // ---- Resting arm (opposite to weapon arm) ----
      const restDir = -s.dir;
      ctx.beginPath();
      ctx.moveTo(x, shouldersY);
      ctx.lineTo(x + restDir * 40, shouldersY + 30);
      ctx.stroke();

      // ---- Weapon arm (with swing animation) ----
      ctx.save();
      ctx.translate(x, shouldersY);
      const armAngle = s.attacking ? getArmAngle(s) : (s.dir === 1 ? -1.9 : 1.9);
      ctx.rotate(armAngle);

      // Draw upper arm (from shoulder)
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(0, 55);
      ctx.stroke();

      const handX = 0;
      const handY = 55;

      if (s.isPlayer) {
        // SWORD
        ctx.save();
        ctx.strokeStyle = s.hitFlash > 0 ? '#FFFFFF' : '#FF6633';
        ctx.shadowColor = s.hitFlash > 0 ? '#FFFFFF' : '#FF3D00';
        ctx.shadowBlur = 22;
        ctx.lineWidth = 4;
        // Blade
        ctx.beginPath();
        ctx.moveTo(handX, handY);
        ctx.lineTo(handX + 8, handY + 75);
        ctx.stroke();
        // Crossguard
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(handX - 14, handY + 20);
        ctx.lineTo(handX + 14, handY + 20);
        ctx.stroke();
        // Pommel
        ctx.beginPath();
        ctx.arc(handX + 1, handY - 4, 4, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      } else {
        // HAMMER (Mjolnir)
        ctx.save();
        ctx.strokeStyle = s.hitFlash > 0 ? '#FFFFFF' : '#33AAFF';
        ctx.fillStyle = s.hitFlash > 0 ? '#FFFFFF' : '#33AAFF';
        ctx.shadowColor = s.hitFlash > 0 ? '#FFFFFF' : '#0088FF';
        ctx.shadowBlur = 22;
        ctx.lineWidth = 4;
        // Handle
        ctx.beginPath();
        ctx.moveTo(handX, handY);
        ctx.lineTo(handX, handY + 45);
        ctx.stroke();
        // Hammer head (rect)
        ctx.lineWidth = 3;
        ctx.strokeRect(handX - 20, handY + 45, 40, 26);
        ctx.globalAlpha = 0.35;
        ctx.fillRect(handX - 20, handY + 45, 40, 26);
        ctx.globalAlpha = 1;
        // Strike line detail on head
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(handX - 20, handY + 55);
        ctx.lineTo(handX + 20, handY + 55);
        ctx.stroke();
        ctx.restore();
      }

      ctx.restore(); // end weapon arm group

      ctx.restore(); // end stickman
    }

    function drawHealthBar(x, y, health, color, label) {
      const bw = 200, bh = 22;

      // Label
      ctx.font = '600 13px Inter, sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.75)';
      ctx.textBaseline = 'bottom';
      ctx.fillText(label + ' — ' + Math.max(0, health) + ' HP', x, y - 5);

      // Background
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.strokeStyle = 'rgba(255,255,255,0.1)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(x, y, bw, bh, 4);
      ctx.fill();
      ctx.stroke();

      // Fill
      const fillW = (Math.max(0, health) / 100) * bw;
      if (fillW > 0) {
        ctx.save();
        ctx.shadowColor = color;
        ctx.shadowBlur = 12;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.roundRect(x, y, fillW, bh, 4);
        ctx.fill();
        ctx.restore();
      }

      // Danger pulse overlay when < 30
      if (health < 30 && health > 0) {
        const pulse = 0.3 + 0.3 * Math.abs(Math.sin(Date.now() * 0.006));
        ctx.save();
        ctx.globalAlpha = pulse;
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.roundRect(x, y, fillW, bh, 4);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawBackground() {
      // Sky gradient
      const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
      skyGrad.addColorStop(0, '#050505');
      skyGrad.addColorStop(1, '#0D0812');
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, W, H);

      // Subtle grid
      ctx.save();
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.lineWidth = 1;
      for (let gx = 0; gx <= W; gx += 60) {
        ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke();
      }
      for (let gy = 0; gy <= H; gy += 60) {
        ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
      }
      ctx.restore();

      // Ground glow (orange neon underneath)
      const groundGrad = ctx.createLinearGradient(0, GROUND, 0, GROUND + 80);
      groundGrad.addColorStop(0, 'rgba(255,61,0,0.25)');
      groundGrad.addColorStop(1, 'rgba(255,61,0,0)');
      ctx.fillStyle = groundGrad;
      ctx.fillRect(0, GROUND, W, 80);

      // Ground line
      ctx.save();
      ctx.strokeStyle = '#FF3D00';
      ctx.lineWidth = 3;
      ctx.shadowColor = '#FF3D00';
      ctx.shadowBlur = 20;
      ctx.beginPath();
      ctx.moveTo(0, GROUND);
      ctx.lineTo(W, GROUND);
      ctx.stroke();
      ctx.restore();
    }

    function drawUI() {
      // Player health bar (left)
      drawHealthBar(18, 20, player.hp, '#FF2200', 'PLAYER');

      // AI health bar (right-aligned)
      drawHealthBar(W - 218, 20, ai.hp, '#0088FF', 'KI');

      // Controls hint
      ctx.save();
      ctx.font = '12px Inter, sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.28)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText('A / D — Bewegen   |   LEERTASTE — Angriff', W / 2, H - 8);
      ctx.restore();
    }

    function drawGameOver() {
      // Dim overlay
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.65)';
      ctx.fillRect(0, 0, W, H);

      // Win text
      const mainText = winner === 'player' ? 'DU HAST GEWONNEN! 🏆' : 'KI GEWINNT! 💀';
      ctx.font = 'bold 58px Bangers, cursive';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = '#FF3D00';
      ctx.shadowBlur = 40;
      ctx.fillStyle = '#FF3D00';
      ctx.fillText(mainText, W / 2, H / 2 - 30);

      ctx.font = '22px Bangers, cursive';
      ctx.shadowBlur = 10;
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.fillText('Neue Runde startet...', W / 2, H / 2 + 28);

      ctx.restore();
    }

    function updatePlayer() {
      if (keys['a'] || keys['A']) {
        player.x -= PLAYER_SPEED;
      }
      if (keys['d'] || keys['D']) {
        player.x += PLAYER_SPEED;
      }

      // Clamp
      player.x = Math.max(30, Math.min(W - 30, player.x));

      // Face direction toward AI
      player.dir = ai.x > player.x ? 1 : -1;

      // Attack
      if ((keys[' ']) && !player.attacking && player.cooldown === 0) {
        player.attacking = true;
        player.attackFrame = 0;
      }

      if (player.attacking) {
        player.attackFrame++;
        if (player.attackFrame >= ATTACK_FRAMES) {
          player.attacking = false;
          player.attackFrame = 0;
          player.cooldown = PLAYER_COOLDOWN;
        }
      }

      if (player.cooldown > 0) player.cooldown--;

      // Hit flash
      if (player.hitFlash > 0) player.hitFlash--;

      // Knockback
      if (player.knockback > 0) {
        player.x += player.knockbackDir * 3;
        player.knockback--;
      }
    }

    function updateAI() {
      const dist = ai.x - player.x;
      const absDist = Math.abs(dist);

      // Face player
      ai.dir = player.x < ai.x ? -1 : 1;

      // Knockback
      if (ai.knockback > 0) {
        ai.x += ai.knockbackDir * 3;
        ai.knockback--;
        ai.x = Math.max(30, Math.min(W - 30, ai.x));
        if (ai.attacking) { ai.attacking = false; ai.attackFrame = 0; }
        return;
      }

      // State machine
      if (ai.aiState === 'chase') {
        if (absDist > 90) {
          ai.x += dist > 0 ? -AI_SPEED : AI_SPEED;
        } else {
          ai.aiState = 'attack';
        }
      } else if (ai.aiState === 'attack') {
        if (ai.cooldown === 0 && !ai.attacking && absDist < 110) {
          ai.attacking = true;
          ai.attackFrame = 0;
        }
        // Back off occasionally when cooldown active and too close
        if (ai.cooldown > 40 && absDist < 60) {
          ai.aiState = 'backoff';
          ai.aiBackTimer = 25 + Math.floor(Math.random() * 20);
        }
        if (absDist > 130) ai.aiState = 'chase';
      } else if (ai.aiState === 'backoff') {
        const backDir = dist > 0 ? 1 : -1; // move away from player
        ai.x += backDir * AI_SPEED * 1.2;
        ai.aiBackTimer--;
        if (ai.aiBackTimer <= 0) ai.aiState = 'chase';
      }

      ai.x = Math.max(30, Math.min(W - 30, ai.x));

      // Attack animation
      if (ai.attacking) {
        ai.attackFrame++;
        if (ai.attackFrame >= ATTACK_FRAMES) {
          ai.attacking = false;
          ai.attackFrame = 0;
          ai.cooldown = AI_COOLDOWN;
          // After cooldown reset, return to chase
          ai.aiState = 'chase';
        }
      }

      if (ai.cooldown > 0) ai.cooldown--;
      if (ai.hitFlash > 0) ai.hitFlash--;
    }

    function resolveHits() {
      // Player hits AI
      if (checkHit(player, ai)) {
        ai.hp -= HIT_DAMAGE;
        ai.hitFlash = 10;
        ai.knockback = 8;
        ai.knockbackDir = player.dir;
        // Interrupt AI attack
        if (ai.attacking) { ai.attacking = false; ai.attackFrame = 0; }
        spawnParticles(ai.x, GROUND - 80, '#0088FF');
      }

      // AI hits player
      if (checkHit(ai, player)) {
        player.hp -= HIT_DAMAGE;
        player.hitFlash = 10;
        player.knockback = 8;
        player.knockbackDir = ai.dir;
        spawnParticles(player.x, GROUND - 80, '#FF2200');
      }
    }

    function update() {
      if (gameOver) {
        gameOverTimer--;
        if (gameOverTimer <= 0) {
          init();
        }
        return;
      }

      updatePlayer();
      updateAI();
      resolveHits();
      updateParticles();

      // Check win conditions
      if (player.hp <= 0 || ai.hp <= 0) {
        gameOver = true;
        gameOverTimer = 150; // ~2.5s at 60fps
        winner = ai.hp <= 0 ? 'player' : 'ai';
      }
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      drawBackground();
      drawParticles();
      drawStickman(player);
      drawStickman(ai);
      drawUI();
      if (gameOver) drawGameOver();
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    init();
    gameLoop();
  })();
  </script>
</body>
</html>
