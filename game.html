        const kneeY = (hipsY + fY) / 2 - 4;
        cLine(hX, hipsY, kneeX, kneeY, 14);
        cLine(kneeX, kneeY, fX, fY, 13);
        cBoot(fX, fY);
      }
      drawLeg(hipX - 7, lFootX, lFootY, lSw);
      drawLeg(hipX + 7, rFootX, rFootY, rSw);

      // ---- Torso ----
      cLine(hipX, hipsY, shouldersX, shouldersY, 17);

      // ---- Head ----
      cCircle(headX, headCY, headR);

      // ---- Face ----
      ctx.save();
      ctx.shadowBlur = 0;
      const eyeOff = 9 * s.dir;
      // Eye whites
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath(); ctx.arc(headX+eyeOff, headCY-4, 5.5, 0, Math.PI*2); ctx.fill();
      // Pupils
      ctx.fillStyle = '#1A1A1A';
      ctx.beginPath(); ctx.arc(headX+eyeOff+s.dir*1.5, headCY-4, 3, 0, Math.PI*2); ctx.fill();
      // Eye shine
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath(); ctx.arc(headX+eyeOff+s.dir*.5, headCY-5.5, 1.2, 0, Math.PI*2); ctx.fill();
      // Angry eyebrow
      ctx.strokeStyle = 'rgba(0,0,0,0.8)'; ctx.lineWidth = 3; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(headX+eyeOff-6, headCY-11); ctx.lineTo(headX+eyeOff+5, headCY-7); ctx.stroke();
      // Grimace mouth
      ctx.strokeStyle = 'rgba(0,0,0,0.7)'; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.moveTo(headX+4*s.dir-7, headCY+9); ctx.lineTo(headX+4*s.dir+7, headCY+9); ctx.stroke();
      // Teeth notches
      for (let t=-3; t<=3; t+=3) {
        ctx.beginPath(); ctx.moveTo(headX+4*s.dir+t, headCY+9); ctx.lineTo(headX+4*s.dir+t, headCY+12); ctx.stroke();
      }
      ctx.restore();

      // King crown (Story Mode)
      if (mode === 'story' && storyPlayerArmor === 'king' && s.isPlayer) {
        ctx.save();
        ctx.fillStyle = '#FFD700'; ctx.shadowColor = '#FFAA00'; ctx.shadowBlur = 14;
        const crY = headCY - headR - 2;
        ctx.fillRect(headX - 15, crY - 6, 30, 7);
        [-10, 0, 10].forEach(px => {
          ctx.beginPath(); ctx.moveTo(headX+px-4, crY-6); ctx.lineTo(headX+px, crY-17); ctx.lineTo(headX+px+4, crY-6); ctx.fill();
        });
        ctx.restore();
      }

      // ---- Back arm (with elbow bend) ----
      const restDir  = -s.dir;
      const armSwing = Math.sin(ph + Math.PI) * 24 * blend;
      const armLift  = Math.abs(Math.sin(ph)) * 8 * blend;
      const elbX = shouldersX + restDir * 20 + armSwing * 0.4;
      const elbY = shouldersY + 20 - armLift;
      const hRX  = shouldersX + restDir * 30 + armSwing;
      const hRY  = shouldersY + 36 - armLift * 0.5;
      if (!(mode === 'story' && storyPlayerArmless && s.isPlayer)) {
        cLine(shouldersX, shouldersY, elbX, elbY, 13);
        cLine(elbX, elbY, hRX, hRY, 12);
        cFist(hRX, hRY);
      }

      // ---- Weapon arm ----
      ctx.save();
      ctx.translate(shouldersX, shouldersY);
      const idleArm  = (s.dir === 1 ? -1.9 : 1.9) + Math.sin(ph) * 0.14 * blend;
      const armAngle = s.attacking ? getArmAngle(s) : idleArm;
      ctx.rotate(armAngle);

      cLine(0, 0, 0, 55, 13);   // upper arm
      cFist(0, 55);              // fist at hand

      const handX = 0, handY = 55;
      const firing = s.weapon === 'pistol' && s.attacking && s.attackFrame >= 8 && s.attackFrame <= 13;

      switch (s.weapon) {
        case 'sword':  drawWeaponSword(handX, handY, color, s.hitFlash);         break;
        case 'hammer': drawWeaponHammer(handX, handY, color, s.hitFlash);        break;
        case 'spear':  drawWeaponSpear(handX, handY, color, s.hitFlash);         break;
        case 'pistol': drawWeaponPistol(handX, handY, color, s.hitFlash, firing); break;
        default:       drawWeaponSword(handX, handY, color, s.hitFlash);          break;
      }

      ctx.restore(); // end weapon arm group

      // ---- Swoosh arc trail during the strike window ----
      if (inStrike(s)) {
        const ult = s.isUltra;
        const wColor = ult ? '#FFD23D' : (s.isPlayer ? '#FF6633' : '#33AAFF');
        const trailFrames = ult ? 8 : 4;
        const radius = ult ? 110 : 95;
        const a0 = getArmAngle({ dir: s.dir, attacking: true, attackFrame: s.attackFrame - trailFrames });
        const a1 = getArmAngle(s);
        // Convert arm angle to a world swoosh centered on shoulder
        ctx.save();
        ctx.translate(shouldersX, shouldersY);
        ctx.strokeStyle = wColor;
        ctx.globalAlpha = ult ? 0.7 : 0.5;
        ctx.shadowColor = ult ? '#FF3D00' : wColor;
        ctx.shadowBlur = ult ? 30 : 18;
        ctx.lineWidth = ult ? 10 : 6;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.arc(0, 0, radius, a0 + Math.PI / 2, a1 + Math.PI / 2, a1 < a0);
        ctx.stroke();
        ctx.globalAlpha = ult ? 0.35 : 0.25;
        ctx.lineWidth = ult ? 22 : 12;
        ctx.beginPath();
        ctx.arc(0, 0, radius, a0 + Math.PI / 2, a1 + Math.PI / 2, a1 < a0);
        ctx.stroke();
        ctx.restore();
      }

      ctx.restore(); // end stickman
    }

    function drawHealthBar(x, y, health, color, label) {
      const bw = 200, bh = 22;

      // Label
      ctx.font = '600 13px Inter, sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.75)';
      ctx.textBaseline = 'bottom';
      ctx.fillText(label + ' — ' + Math.max(0, health) + ' HP', x, y - 5);

      // Background
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.strokeStyle = 'rgba(255,255,255,0.1)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(x, y, bw, bh, 4);
      ctx.fill();
      ctx.stroke();

      // Fill
      const fillW = (Math.max(0, health) / 100) * bw;
      if (fillW > 0) {
        ctx.save();
        ctx.shadowColor = color;
        ctx.shadowBlur = 12;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.roundRect(x, y, fillW, bh, 4);
        ctx.fill();
        ctx.restore();
      }

      // Danger pulse overlay when < 30
      if (health < 30 && health > 0) {
        const pulse = 0.3 + 0.3 * Math.abs(Math.sin(Date.now() * 0.006));
        ctx.save();
        ctx.globalAlpha = pulse;
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.roundRect(x, y, fillW, bh, 4);
        ctx.fill();
        ctx.restore();
      }
    }

    // ---- Snow system ----
    function spawnSnow() {
      if (map !== 'ice') return;
      if (snow.length < 120 && Math.random() < 0.4) {
        snow.push({ x: Math.random() * W, y: -8, r: 2 + Math.random() * 4,
          speed: 0.8 + Math.random() * 1.8, drift: (Math.random() - 0.5) * 0.6,
          opacity: 0.4 + Math.random() * 0.6 });
      }
      for (let i = snow.length - 1; i >= 0; i--) {
        const s = snow[i];
        s.y += s.speed; s.x += s.drift;
        if (s.y > H + 10) snow.splice(i, 1);
      }
    }

    function drawSnow() {
      for (const s of snow) {
        ctx.save();
        ctx.globalAlpha = s.opacity;
        ctx.fillStyle = '#E8F4FF';
        ctx.shadowColor = '#A8DFFF';
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // ---- Cactus drawing ----
    function drawCactus(cx, baseY, h) {
      ctx.save();
      ctx.strokeStyle = '#3A7A2A';
      ctx.fillStyle = '#2D6020';
      ctx.lineWidth = 0;
      const w = h * 0.18;
      // Main trunk
      ctx.fillRect(cx - w/2, baseY - h, w, h);
      // Left arm
      const lArmY = baseY - h * 0.6;
      ctx.fillRect(cx - w/2 - w*1.5, lArmY - h*0.25, w, h*0.3);
      ctx.fillRect(cx - w/2 - w*1.5, lArmY - h*0.25, w, h*0.25);
      // Left arm vertical
      ctx.fillRect(cx - w/2 - w*1.5, lArmY - h*0.45, w, h*0.22);
      // Right arm
      const rArmY = baseY - h * 0.45;
      ctx.fillRect(cx + w/2, rArmY - h*0.15, w*1.5, w);
      ctx.fillRect(cx + w/2 + w*1.5 - w, rArmY - h*0.35, w, h*0.22);
      // Spines (light green lines)
      ctx.strokeStyle = '#7DC96A';
      ctx.lineWidth = 1;
      for (let i = 0; i < 5; i++) {
        const sy = baseY - h * 0.15 - i * (h * 0.16);
        ctx.beginPath(); ctx.moveTo(cx - w/2 - 5, sy); ctx.lineTo(cx - w/2 - 12, sy - 4); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + w/2 + 5, sy); ctx.lineTo(cx + w/2 + 12, sy - 4); ctx.stroke();
      }
      ctx.restore();
    }

    // ---- Castle drawing (reusable: background silhouette & full map) ----
    // style: 'far' = distant silhouette, 'near' = detailed stone
    function drawCastle(cx, baseY, scale, style) {
      ctx.save();
      const far = style === 'far';
      const stone = far ? '#5A6B7A' : '#8A8170';
      const stoneDark = far ? '#46535F' : '#6E665859';
      const u = scale; // unit
      ctx.fillStyle = stone;
      ctx.strokeStyle = far ? '#3A4651' : '#5C5446';
      ctx.lineWidth = far ? 0 : 2;

      const wallW = 120 * u, wallH = 70 * u;
      const wallX = cx - wallW / 2, wallY = baseY - wallH;

      // Main wall
      ctx.fillRect(wallX, wallY, wallW, wallH);
      // Battlements on main wall
      const merlonW = 14 * u;
      for (let mx = wallX; mx < wallX + wallW - 2; mx += merlonW * 2) {
        ctx.fillRect(mx, wallY - 10 * u, merlonW, 10 * u);
      }

      // Towers (left, right, center taller)
      function tower(tx, tw, th) {
        const tY = baseY - th;
        ctx.fillRect(tx - tw / 2, tY, tw, th);
        // Battlements
        for (let mx = tx - tw / 2; mx < tx + tw / 2 - 1; mx += (tw / 3)) {
          ctx.fillRect(mx, tY - 9 * u, tw / 6, 9 * u);
        }
        // Conical roof
        ctx.save();
        ctx.fillStyle = far ? '#3E4A55' : '#7A3B2E';
        ctx.beginPath();
        ctx.moveTo(tx - tw / 2 - 4 * u, tY - 9 * u);
        ctx.lineTo(tx, tY - 9 * u - th * 0.5);
        ctx.lineTo(tx + tw / 2 + 4 * u, tY - 9 * u);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
        // Window
        if (!far) {
          ctx.save();
          ctx.fillStyle = '#2A2418';
          ctx.fillRect(tx - 4 * u, tY + th * 0.4, 8 * u, 14 * u);
          ctx.restore();
        }
      }
      tower(wallX, 34 * u, wallH + 28 * u);
      tower(wallX + wallW, 34 * u, wallH + 28 * u);
      tower(cx, 40 * u, wallH + 55 * u);

      // Gate (arched)
      if (!far) {
        ctx.fillStyle = '#2A2418';
        const gW = 34 * u, gH = 42 * u;
        ctx.beginPath();
        ctx.moveTo(cx - gW / 2, baseY);
        ctx.lineTo(cx - gW / 2, baseY - gH + gW / 2);
        ctx.arc(cx, baseY - gH + gW / 2, gW / 2, Math.PI, 0);
        ctx.lineTo(cx + gW / 2, baseY);
        ctx.closePath();
        ctx.fill();
        // Portcullis bars
        ctx.strokeStyle = '#5C5446';
        ctx.lineWidth = 2;
        for (let bx = cx - gW / 2 + 6 * u; bx < cx + gW / 2; bx += 8 * u) {
          ctx.beginPath(); ctx.moveTo(bx, baseY); ctx.lineTo(bx, baseY - gH + 4 * u); ctx.stroke();
        }
      } else {
        // distant gate hint
        ctx.fillStyle = '#2E3842';
        ctx.fillRect(cx - 12 * u, baseY - 30 * u, 24 * u, 30 * u);
      }

      // Brick lines on near walls
      if (!far) {
        ctx.strokeStyle = 'rgba(0,0,0,0.12)';
        ctx.lineWidth = 1;
        for (let by = wallY + 14 * u; by < baseY; by += 14 * u) {
          ctx.beginPath(); ctx.moveTo(wallX, by); ctx.lineTo(wallX + wallW, by); ctx.stroke();
        }
      }
      ctx.restore();
    }

    function drawBackground() {
      if (map === 'desert') {
        // Desert sky gradient
        const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
        skyGrad.addColorStop(0, '#1A0A00');
        skyGrad.addColorStop(0.5, '#3D1800');
        skyGrad.addColorStop(1, '#7A3500');

        ctx.fillRect(0, 0, W, H);

        // Sun glow
        ctx.save();
        ctx.shadowColor = '#FF8C00';
        ctx.shadowBlur = 60;
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.arc(W * 0.78, 70, 38, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // Sand ground

        sandGrad.addColorStop(0, '#C8873A');

        // Cacti in background

        iceGrad.addColorStop(1, '#5A90B0');

        // Snow surface bumps
        ctx.save();
        ctx.fillStyle = '#D4EEFA';

        // Ice cracks on ground

        ctx.save();
        ctx.strokeStyle = '#5BC8FF';

        ctx.shadowColor = '#A8DFFF';
        ctx.shadowBlur = 18;
        ctx.beginPath();
        ctx.moveTo(0, GROUND); ctx.lineTo(W, GROUND);
        ctx.stroke();
        ctx.restore();

        // Snow particles

        drawSnow();

      } else if (map === 'grass') {
        // === ANIME GRASSLAND (cel-shaded) ===
        const HORIZ = 265;

        // Sky — vivid saturated anime blue
        const skyG = ctx.createLinearGradient(0, 0, 0, HORIZ);
        skyG.addColorStop(0,    '#0D7EC8');
        skyG.addColorStop(0.38, '#2AAAE0');
        skyG.addColorStop(0.72, '#60C8F0');
        skyG.addColorStop(1,    '#A0DCFA');
        ctx.fillStyle = skyG;
        ctx.fillRect(0, 0, W, HORIZ + 20);

        // Horizon atmospheric glow
        ctx.save();
        const hgG = ctx.createLinearGradient(0, HORIZ - 30, 0, HORIZ + 10);
        hgG.addColorStop(0, 'rgba(220,242,255,0)');
        hgG.addColorStop(1, 'rgba(220,242,255,0.55)');
        ctx.fillStyle = hgG;
        ctx.fillRect(0, HORIZ - 30, W, 40);
        ctx.restore();

        // Wispy cloud streaks
        ctx.save();
        [[120,48,155,7],[310,62,125,5],[470,38,185,8],
         [680,56,145,6],[840,76,105,5],[570,102,95,4]].forEach(([cx,cy,rw,rh]) => {
          const wg = ctx.createLinearGradient(cx-rw, cy, cx+rw, cy);
          wg.addColorStop(0,   'rgba(255,255,255,0)');
          wg.addColorStop(0.28,'rgba(255,255,255,0.82)');
          wg.addColorStop(0.72,'rgba(255,255,255,0.82)');
          wg.addColorStop(1,   'rgba(255,255,255,0)');
          ctx.fillStyle = wg;
          ctx.beginPath(); ctx.ellipse(cx, cy, rw, rh, 0, 0, Math.PI*2); ctx.fill();
        });
        ctx.restore();

        // Cel-shaded anime clouds
        function animeCloud(cx, cy, s) {
          // Step 1 — cast shadow below cloud
          ctx.fillStyle = '#9EC8E8';
          ctx.beginPath();
          ctx.ellipse(cx, cy + s*24, s*66, s*13, 0, 0, Math.PI*2);
          ctx.fill();
          // Step 2 — blue-gray shadow layer (bottom of cloud body)
          ctx.fillStyle = '#BDD8EE';
          [[-s*26,s*13,s*28],[0,s*16,s*34],[s*28,s*12,s*30],
           [-s*46,s*18,s*20],[s*48,s*16,s*22]].forEach(([dx,dy,r]) => {
            ctx.beginPath(); ctx.arc(cx+dx, cy+dy, r, 0, Math.PI*2); ctx.fill();
          });
          // Step 3 — main off-white body
          ctx.fillStyle = '#EEF6FF';
          [[0,0,s*36],[-s*26,s*9,s*28],[s*28,s*7,s*31],
           [-s*12,-s*14,s*25],[s*14,-s*16,s*26],
           [-s*46,s*15,s*20],[s*48,s*13,s*22],[s*1,-s*25,s*19]].forEach(([dx,dy,r]) => {
            ctx.beginPath(); ctx.arc(cx+dx, cy+dy, r, 0, Math.PI*2); ctx.fill();
          });
          // Step 4 — pure white highlights on top
          ctx.fillStyle = '#FFFFFF';
          [[-s*10,-s*16,s*17],[s*9,-s*14,s*15],[0,-s*6,s*20],
           [-s*23,s*2,s*13],[s*24,s*1,s*14]].forEach(([dx,dy,r]) => {
            ctx.beginPath(); ctx.arc(cx+dx, cy+dy, r, 0, Math.PI*2); ctx.fill();
          });
        }
        animeCloud(710, 72, 1.28);
        animeCloud(858, 50, 1.02);
        animeCloud(568, 55, 0.98);
        animeCloud(148, 84, 1.08);
        animeCloud(44,  126, 0.78);
        animeCloud(375, 110, 0.85);
        animeCloud(248, 144, 0.66);
        animeCloud(645, 144, 0.72);

        // Far distant hills — blue-green silhouette
        ctx.save();
        ctx.fillStyle = '#2A5E38';
        ctx.beginPath();
        ctx.moveTo(0, HORIZ + 8);
        ctx.bezierCurveTo(110, HORIZ-30, 270, HORIZ-26, 430, HORIZ-18);
        ctx.bezierCurveTo(570, HORIZ-12, 695, HORIZ-28, 820, HORIZ-22);
        ctx.bezierCurveTo(865, HORIZ-18, 888, HORIZ-14, W, HORIZ-16);
        ctx.lineTo(W, HORIZ+8); ctx.closePath(); ctx.fill(); ctx.restore();

        // Closer hills — medium green
        ctx.save();
        ctx.fillStyle = '#388528';
        ctx.beginPath();
        ctx.moveTo(0, HORIZ+14);
        ctx.bezierCurveTo(75, HORIZ-8, 195, HORIZ-6, 355, HORIZ);
        ctx.bezierCurveTo(475, HORIZ+6, 615, HORIZ-10, 755, HORIZ-4);
        ctx.bezierCurveTo(835, HORIZ, 878, HORIZ+4, W, HORIZ+2);
        ctx.lineTo(W, HORIZ+14); ctx.closePath(); ctx.fill(); ctx.restore();

        // Meadow — vivid saturated green with cel-shading bands
        const meadG = ctx.createLinearGradient(0, HORIZ, 0, H);
        meadG.addColorStop(0,    '#8CD835');
        meadG.addColorStop(0.08, '#74C428');
        meadG.addColorStop(0.28, '#60B020');
        meadG.addColorStop(0.55, '#50A018');
        meadG.addColorStop(0.8,  '#408A10');
        meadG.addColorStop(1,    '#307808');
        ctx.fillStyle = meadG;
        ctx.fillRect(0, HORIZ, W, H - HORIZ);

        // Anime-style color bands on grass (cel shading stripes)
        ctx.save();
        [[HORIZ+20, 12, 'rgba(160,236,80,0.22)'],
         [HORIZ+48, 10, 'rgba(140,218,60,0.18)'],
         [HORIZ+82, 8,  'rgba(120,200,50,0.14)'],
         [HORIZ+130, 7, 'rgba(100,180,40,0.10)']].forEach(([y, bh, col]) => {
          ctx.fillStyle = col;
          ctx.fillRect(0, y, W, bh);
        });
        ctx.restore();

        // Tree — left side, stylized anime with layered leaf clusters
        const TX = 88, TBASE = HORIZ + 95, TTOP = HORIZ - 155;
        ctx.save();
        // Trunk
        ctx.fillStyle = '#4A2E10';
        ctx.beginPath();
        ctx.moveTo(TX-9, TBASE);
        ctx.bezierCurveTo(TX-11, TBASE-55, TX-7, TTOP+75, TX-5, TTOP+28);
        ctx.lineTo(TX+5, TTOP+28);
        ctx.bezierCurveTo(TX+7, TTOP+75, TX+11, TBASE-55, TX+9, TBASE);
        ctx.closePath(); ctx.fill();
        // Branches
        ctx.strokeStyle = '#4A2E10'; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.moveTo(TX-4, TTOP+78);
        ctx.bezierCurveTo(TX-28, TTOP+58, TX-54, TTOP+55, TX-68, TTOP+46); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(TX+4, TTOP+68);
        ctx.bezierCurveTo(TX+33, TTOP+46, TX+57, TTOP+43, TX+72, TTOP+34); ctx.stroke();
        // Leaf clusters — dark to bright, staggered for volume
        [// shadow clusters
         [TX,    TTOP-8,  70, '#1E5812'],
         [TX-6,  TTOP-10, 60, '#287018'],
         // main body
         [TX+8,  TTOP-6,  52, '#328A20'],
         [TX-16, TTOP-4,  42, '#3A9826'],
         [TX-4,  TTOP-22, 38, '#44A82E'],
         // bright top highlights
         [TX-14, TTOP-28, 28, '#52BE38'],
         [TX+6,  TTOP-30, 24, '#5ACC40'],
         // branch clusters
         [TX-70, TTOP+38, 24, '#287018'],
         [TX+74, TTOP+26, 20, '#287018']
        ].forEach(([cx, cy, r, col]) => {
          ctx.fillStyle = col;
          ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
        });
        ctx.restore();

        // Mid-ground small daisies (distant, perspective)
        function daisy(x, y, r, n) {
          ctx.fillStyle = '#FFFFFF';
          for (let i = 0; i < n; i++) {
            const a = (i / n) * Math.PI * 2;
            ctx.beginPath();
            ctx.ellipse(x + Math.cos(a)*r*1.65, y + Math.sin(a)*r*1.65, r*0.88, r*0.44, a, 0, Math.PI*2);
            ctx.fill();
          }
          ctx.fillStyle = '#F0D010';
          ctx.beginPath(); ctx.arc(x, y, r*0.92, 0, Math.PI*2); ctx.fill();
        }
        [[195,316,2.1,6],[262,308,1.9,6],[338,318,2.1,6],[418,310,1.9,6],
         [498,316,2.1,6],[578,308,1.9,6],[658,318,2.1,6],[738,312,2.1,6],
         [818,314,1.9,6]].forEach(d => daisy(...d));

        // Tall foreground grass blades — vivid bright green
        ctx.save();
        for (let gx = 0; gx <= W; gx += 4) {
          const lean = Math.sin(gx * 0.115) * 9 + Math.cos(gx * 0.24) * 5;
          const gh   = 24 + Math.sin(gx * 0.36) * 11 + Math.cos(gx * 0.61) * 7;
          const t    = Math.floor(gx / 4) % 4;
          ctx.strokeStyle = ['#52D820','#40C810','#64E82A','#38B808'][t];
          ctx.lineWidth = 1.9;
          ctx.beginPath();
          ctx.moveTo(gx, GROUND + 10);
          ctx.quadraticCurveTo(gx + lean*0.5, GROUND - gh*0.48, gx + lean*1.35, GROUND - gh);
          ctx.stroke();
        }
        ctx.restore();

        // Large foreground daisies
        [[38,GROUND-14,5.5,8],[112,GROUND-10,5,8],[192,GROUND-15,5.5,8],
         [282,GROUND-11,5,8],[368,GROUND-13,5.5,8],[452,GROUND-10,5,8],
         [542,GROUND-14,5.5,8],[622,GROUND-11,5,8],[708,GROUND-13,5.5,8],
         [792,GROUND-10,5,8],[866,GROUND-12,5.5,8]
        ].forEach(d => daisy(...d));

        // Red poppies — vivid saturated
        function poppy(x, y, r) {
          ctx.fillStyle = '#E01818';
          for (let i = 0; i < 4; i++) {
            const a = (i/4)*Math.PI*2 + Math.PI/8;
            ctx.beginPath();
            ctx.ellipse(x+Math.cos(a)*r, y+Math.sin(a)*r, r*1.2, r*0.92, a, 0, Math.PI*2);
            ctx.fill();
          }
          // petal highlight
          ctx.fillStyle = '#F84040';
          for (let i = 0; i < 4; i++) {
            const a = (i/4)*Math.PI*2 + Math.PI/8;
            ctx.beginPath();
            ctx.ellipse(x+Math.cos(a)*r*0.6, y+Math.sin(a)*r*0.6-r*0.3, r*0.5, r*0.35, a, 0, Math.PI*2);
            ctx.fill();
          }
          ctx.fillStyle = '#0E0505';
          ctx.beginPath(); ctx.arc(x, y, r*0.3, 0, Math.PI*2); ctx.fill();
        }
        [[152,GROUND-18,6.5],[242,GROUND-14,6],[335,GROUND-17,6.5],
         [485,GROUND-15,6],[570,GROUND-18,6.5],[670,GROUND-14,6],[796,GROUND-17,6.5]
        ].forEach(p => poppy(...p));

        // Blue/purple flowers
        ctx.save();
        [[82,GROUND-6],[178,GROUND-9],[318,GROUND-7],[440,GROUND-10],
         [552,GROUND-6],[636,GROUND-9],[746,GROUND-7],[846,GROUND-10]
        ].forEach(([x, y]) => {
          ctx.fillStyle = '#7070E0';
          for (let i = 0; i < 5; i++) {
            const a = (i/5)*Math.PI*2;
            ctx.beginPath();
            ctx.ellipse(x+Math.cos(a)*5.5, y+Math.sin(a)*5.5, 3.2, 4.8, a, 0, Math.PI*2);
            ctx.fill();
          }
          ctx.fillStyle = '#C8C8FF';
          ctx.beginPath(); ctx.arc(x, y, 2.2, 0, Math.PI*2); ctx.fill();
        });
        ctx.restore();

      } else if (map === 'castle') {
        // Dusk sky behind the castle
        const skyGrad = ctx.createLinearGradient(0, 0, 0, GROUND);
        skyGrad.addColorStop(0, '#1B1430');
        skyGrad.addColorStop(0.6, '#3A2848');
        skyGrad.addColorStop(1, '#6B3A4A');
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, W, GROUND);

        // Moon
        ctx.save();
        ctx.shadowColor = '#FFF8E0';
        ctx.shadowBlur = 40;
        ctx.fillStyle = '#F5EFD0';
        ctx.beginPath();
        ctx.arc(W * 0.82, 75, 28, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // Big detailed castle filling the background
        drawCastle(W * 0.5, GROUND, 1.35, 'near');

        // Stone courtyard ground
        const stoneGrad = ctx.createLinearGradient(0, GROUND, 0, H);
        stoneGrad.addColorStop(0, '#8A8170');
        stoneGrad.addColorStop(1, '#5C5446');
        ctx.fillStyle = stoneGrad;
        ctx.fillRect(0, GROUND, W, H - GROUND);

        // Cobblestone lines
        ctx.save();
        ctx.strokeStyle = 'rgba(0,0,0,0.18)';
        ctx.lineWidth = 1;
        for (let cy = GROUND + 14; cy < H; cy += 16) {
          ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(W, cy); ctx.stroke();
        }
        for (let cx = 0; cx <= W; cx += 40) {
          ctx.beginPath(); ctx.moveTo(cx, GROUND); ctx.lineTo(cx + 8, H); ctx.stroke();
        }
        ctx.restore();

        // Wall torches with flickering flame
        ctx.save();
        [W * 0.12, W * 0.88].forEach((tx) => {
          // Bracket
          ctx.fillStyle = '#3A2E20';
          ctx.fillRect(tx - 3, GROUND - 130, 6, 40);
          // Flame
          const flick = 0.7 + Math.abs(Math.sin(Date.now() * 0.012 + tx)) * 0.5;
          ctx.shadowColor = '#FF8C00';
          ctx.shadowBlur = 30 * flick;
          ctx.fillStyle = '#FFB02E';
          ctx.beginPath();
          ctx.ellipse(tx, GROUND - 138, 7, 14 * flick, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#FFE07A';
          ctx.beginPath();
          ctx.ellipse(tx, GROUND - 136, 3.5, 8 * flick, 0, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.restore();

        // Ground line (warm stone glow)
        ctx.save();
        ctx.strokeStyle = '#C2A86A';
        ctx.lineWidth = 3;
        ctx.shadowColor = '#FF8C00';
        ctx.shadowBlur = 16;
        ctx.beginPath();
        ctx.moveTo(0, GROUND); ctx.lineTo(W, GROUND);
        ctx.stroke();
        ctx.restore();

      } else {
        // Default dark bg (shown behind menus)
        const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
        skyGrad.addColorStop(0, '#050505');
        skyGrad.addColorStop(1, '#0D0812');
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, W, H);
        ctx.save();
        ctx.strokeStyle = '#FF3D00';
        ctx.lineWidth = 3;
        ctx.shadowColor = '#FF3D00';
        ctx.shadowBlur = 20;
        ctx.beginPath();
        ctx.moveTo(0, GROUND); ctx.lineTo(W, GROUND);
        ctx.stroke();
        ctx.restore();
      }
    }

    function updatePlayer() {
      player.moving = false;
      player.moveDir = 0;
      const left  = keys['a'] || keys['A'];
      const right = keys['d'] || keys['D'];
      const both  = left && right;

      if (!both) {
        if (left)  { player.x -= PLAYER_SPEED; player.moving = true; player.moveDir = -1; }
        if (right) { player.x += PLAYER_SPEED; player.moving = true; player.moveDir = 1; }
      }

      // Clamp
      player.x = Math.max(30, Math.min(W - 30, player.x));

      // Face direction toward AI
      player.dir = ai.x > player.x ? 1 : -1;

      // Jump: Spacebar
      if (keys[' '] && player.onGround) {
        player.vy = JUMP_FORCE;
        player.onGround = false;
      }

      // ULTRA attack: A + D together
      if (both && !player.attacking && player.cooldown === 0) {
        player.attacking = true;
        player.attackFrame = 0;
        player.isUltra = true;
        player.ultraFlash = 45;
      }
      // Normal attack: left mouse click
      else if (keys['MouseLeft'] && !player.attacking && player.cooldown === 0) {
        player.attacking = true;
        player.attackFrame = 0;
        player.isUltra = false;
      }

      if (player.attacking) {
        player.attackFrame++;
        if (player.attackFrame >= ATTACK_FRAMES) {
          player.attacking = false;
          player.attackFrame = 0;
          player.cooldown = player.isUltra ? ULTRA_COOLDOWN : PLAYER_COOLDOWN;
          player.isUltra = false;
        }
      }
      if (player.ultraFlash > 0) player.ultraFlash--;

      if (player.cooldown > 0) player.cooldown--;

      // Hit flash
      if (player.hitFlash > 0) player.hitFlash--;

      // Knockback
      if (player.knockback > 0) {
        player.x += player.knockbackDir * 3;
        player.knockback--;
      }

      // Gravity & landing
      player.vy += GRAVITY;
      player.y  += player.vy;
      if (player.y >= GROUND) { player.y = GROUND; player.vy = 0; player.onGround = true; }
    }

    function updateAI() {
      const dist = ai.x - player.x;
      const absDist = Math.abs(dist);
      ai.moving = false;

      // Face player
      ai.dir = player.x < ai.x ? -1 : 1;

      // Knockback
      if (ai.knockback > 0) {
        ai.x += ai.knockbackDir * 3;
        ai.knockback--;
        ai.x = Math.max(30, Math.min(W - 30, ai.x));
        if (ai.attacking) { ai.attacking = false; ai.attackFrame = 0; }
        return;
      }

      // State machine
      if (ai.aiState === 'chase') {
        if (absDist > 90) {
          const d = dist > 0 ? -1 : 1;
          ai.x += d * AI_SPEED;
          ai.moving = true; ai.moveDir = d;
        } else {
          ai.aiState = 'attack';
        }
      } else if (ai.aiState === 'attack') {
        if (ai.cooldown === 0 && !ai.attacking && absDist < 110) {
          ai.attacking = true;
          ai.attackFrame = 0;
        }
        // Back off occasionally when cooldown active and too close
        if (ai.cooldown > 40 && absDist < 60) {
          ai.aiState = 'backoff';
          ai.aiBackTimer = 25 + Math.floor(Math.random() * 20);
        }
        if (absDist > 130) ai.aiState = 'chase';
      } else if (ai.aiState === 'backoff') {
        const backDir = dist > 0 ? 1 : -1; // move away from player
        ai.x += backDir * AI_SPEED * 1.2;
        ai.moving = true; ai.moveDir = backDir;
        ai.aiBackTimer--;
        if (ai.aiBackTimer <= 0) ai.aiState = 'chase';
      }

      ai.x = Math.max(30, Math.min(W - 30, ai.x));

      // Attack animation
      if (ai.attacking) {
        ai.attackFrame++;
        if (ai.attackFrame >= ATTACK_FRAMES) {
          ai.attacking = false;
          ai.attackFrame = 0;
          ai.cooldown = AI_COOLDOWN;
          // After cooldown reset, return to chase
          ai.aiState = 'chase';
        }
      }

      if (ai.cooldown > 0) ai.cooldown--;
      if (ai.hitFlash > 0) ai.hitFlash--;
    }

    function updatePlayer2() {
      // Player 2 controls the blue stickman: ←=left, →=right, Enter=attack, ←+→=ultra
      ai.moving = false;
      ai.moveDir = 0;
      const left  = keys['ArrowLeft'];
      const right = keys['ArrowRight'];
      const both  = left && right;

      if (!both) {
        if (left)  { ai.x -= PLAYER_SPEED; ai.moving = true; ai.moveDir = -1; }
        if (right) { ai.x += PLAYER_SPEED; ai.moving = true; ai.moveDir = 1; }
      }

      ai.x = Math.max(30, Math.min(W - 30, ai.x));

      // Face player 1
      ai.dir = player.x < ai.x ? -1 : 1;

      // Jump: Arrow Up
      if (keys['ArrowUp'] && ai.onGround) {
        ai.vy = JUMP_FORCE;
        ai.onGround = false;
      }

      // ULTRA attack: ← + → together
      if (both && !ai.attacking && ai.cooldown === 0) {
        ai.attacking = true;
        ai.attackFrame = 0;
        ai.isUltra = true;
        ai.ultraFlash = 45;
      }
      // Normal attack
      else if (keys['Enter'] && !ai.attacking && ai.cooldown === 0) {
        ai.attacking = true;
        ai.attackFrame = 0;
        ai.isUltra = false;
      }

      if (ai.attacking) {
        ai.attackFrame++;
        if (ai.attackFrame >= ATTACK_FRAMES) {
          ai.attacking = false;
          ai.attackFrame = 0;
          ai.cooldown = ai.isUltra ? ULTRA_COOLDOWN : PLAYER_COOLDOWN;
          ai.isUltra = false;
        }
      }
      if (ai.ultraFlash > 0) ai.ultraFlash--;

      if (ai.cooldown > 0) ai.cooldown--;
      if (ai.hitFlash > 0) ai.hitFlash--;

      // Knockback
      if (ai.knockback > 0) {
        ai.x += ai.knockbackDir * 3;
        ai.knockback--;
        ai.x = Math.max(30, Math.min(W - 30, ai.x));
      }

      // Gravity & landing
      ai.vy += GRAVITY;
      ai.y  += ai.vy;
      if (ai.y >= GROUND) { ai.y = GROUND; ai.vy = 0; ai.onGround = true; }
    }

    function resolveHits() {
      function applyHit(attacker, target, particleColor) {
        const ult = attacker.isUltra;
        const dmg = ult ? ULTRA_DAMAGE : (attacker.weapon === 'hammer' ? 12 : HIT_DAMAGE);
        const kb  = ult ? 20 : (attacker.weapon === 'hammer' ? 13 : 8);
        target.hp -= dmg;
        target.hitFlash = ult ? 18 : 10;
        target.knockback = kb;
        target.knockbackDir = attacker.dir;
        if (target.attacking) { target.attacking = false; target.attackFrame = 0; }
        spawnParticles(target.x, GROUND - 80, ult ? '#FFD23D' : particleColor, ult ? 36 : 14);
        if (ult) { shake = 16; spawnParticles(target.x, GROUND - 80, '#FF3D00', 20); }
        if (!ult && attacker.weapon === 'hammer') shake = Math.max(shake, 6);
      }
      if (checkHit(player, ai))     applyHit(player, ai,     ai.color     || '#0088FF');
      if (checkHit(ai,     player)) applyHit(ai,     player, player.color || '#FF2200');
    }

    // ===== Soccer logic =====
    function updateBall() {
      if (ball.kickLock > 0) ball.kickLock--;
      ball.vy += 0.45;                 // gravity
      ball.x += ball.vx;
      ball.y += ball.vy;
      ball.rot += ball.vx * 0.05;
      ball.vx *= 0.995;                // air drag

      // Ground bounce
      if (ball.y + ball.r > GROUND) {
        ball.y = GROUND - ball.r;
        ball.vy *= -0.55;
        ball.vx *= 0.9;                // rolling friction
        if (Math.abs(ball.vy) < 1) ball.vy = 0;
      }
      // Ceiling
      if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy *= -0.5; }

      // Side walls — only bounce ABOVE the goal mouth; goal-height balls fly in
      const inGoalH = ball.y > GROUND - GOAL_HEIGHT;
      if (!inGoalH) {
        if (ball.x - ball.r < 0)  { ball.x = ball.r; ball.vx = Math.abs(ball.vx) * 0.7; }
        if (ball.x + ball.r > W)  { ball.x = W - ball.r; ball.vx = -Math.abs(ball.vx) * 0.7; }
      }
    }

    function kickBall(s) {
      if (ball.kickLock > 0) return;   // ball was already kicked this frame or recently
      const dx = ball.x - s.x;
      const bodyTop = s.y - 175;
      if (Math.abs(dx) < ball.r + 20 && ball.y > bodyTop && ball.y < s.y + 6) {
        const dir = dx >= 0 ? 1 : -1;
        let power = 4 + Math.abs(s.moveDir || 0) * 2;
        let lift = 2.5;
        if (s.attacking) {
          const t = s.attackFrame / ATTACK_FRAMES;
          if (t > 0.25 && t < 0.6) {                 // during the swing strike
            power = s.isUltra ? 17 : 11;
            lift  = s.isUltra ? 10 : 6;
            spawnParticles(ball.x, ball.y, s.isUltra ? '#FFD23D' : (s.isPlayer ? '#FF6633' : '#33AAFF'), s.isUltra ? 18 : 10);
          }
        }
        ball.vx = dir * power + (s.moveDir || 0) * 1.5;
        ball.vy = -lift;
        ball.x = s.x + dir * (ball.r + 24);  // push far enough outside collision zone
        ball.kickLock = 5;                    // ~83ms cooldown prevents double-kick
      }
    }

    function checkGoal() {
      const inH = ball.y > GROUND - GOAL_HEIGHT;
      if (!inH) return;
      if (ball.x - ball.r <= GOAL_DEPTH) { onGoal(2); }            // left goal → P2 scores
      else if (ball.x + ball.r >= W - GOAL_DEPTH) { onGoal(1); }   // right goal → P1 scores
    }

    function onGoal(scorer) {
      if (scorer === 1) score.p1++; else score.p2++;
      goalFlash = 90;
      shake = 16;
      spawnParticles(ball.x, ball.y, '#FFD23D', 44);
      spawnParticles(ball.x, ball.y, '#FFFFFF', 22);
      if (score.p1 >= GOALS_TO_WIN || score.p2 >= GOALS_TO_WIN) {
        gameOver = true;
        gameOverTimer = 180;
        winner = score.p1 > score.p2 ? 'player' : 'ai';
      } else {
        resetBall(scorer === 1 ? -1 : 1);             // kickoff toward the side that conceded
      }
    }

    function updateSoccer() {
      updatePlayer();
      updatePlayer2();
      stepWalk(player);
      stepWalk(ai);
      updateBall();
      kickBall(player);
      kickBall(ai);
      checkGoal();
      if (goalFlash > 0) goalFlash--;
    }

    // ---- Online helpers ----
    function getLocalKeys() {
      const l = keys['ArrowLeft'], r = keys['ArrowRight'];
      return { left: !!(l&&!r), right: !!(r&&!l), attack: !!keys['Enter'],
               ultra: !!(l&&r), jump: !!keys['ArrowUp'] };
    }
    function updatePlayer2Online() {
      ai.moving = false;
      ai.moveDir = 0;
      const { left, right, attack, ultra, jump } = remoteKeys;
      if (left)  { ai.x -= PLAYER_SPEED; ai.moving = true; ai.moveDir = -1; }
      if (right) { ai.x += PLAYER_SPEED; ai.moving = true; ai.moveDir = 1;  }
      ai.x = Math.max(30, Math.min(W-30, ai.x));
      ai.dir = player.x < ai.x ? -1 : 1;
      if (jump && ai.onGround) { ai.vy = JUMP_FORCE; ai.onGround = false; }
      if (ultra && !ai.attacking && ai.cooldown === 0) {
        ai.attacking=true; ai.attackFrame=0; ai.isUltra=true; ai.ultraFlash=45;
      } else if (attack && !ultra && !ai.attacking && ai.cooldown === 0) {
        ai.attacking=true; ai.attackFrame=0; ai.isUltra=false;
      }
      if (ai.attacking) { ai.attackFrame++; if (ai.attackFrame>=ATTACK_FRAMES){ai.attacking=false;ai.attackFrame=0;ai.cooldown=ai.isUltra?ULTRA_COOLDOWN:PLAYER_COOLDOWN;ai.isUltra=false;} }
      if (ai.ultraFlash>0) ai.ultraFlash--;
      if (ai.cooldown>0)   ai.cooldown--;
      if (ai.hitFlash>0)   ai.hitFlash--;
      if (ai.knockback>0)  { ai.x+=ai.knockbackDir*3; ai.knockback--; ai.x=Math.max(30,Math.min(W-30,ai.x)); }
      ai.vy += GRAVITY; ai.y += ai.vy;
      if (ai.y >= GROUND) { ai.y = GROUND; ai.vy = 0; ai.onGround = true; }
    }
    function pickNetState(s) {
      return { x:s.x,y:s.y,vy:s.vy,onGround:s.onGround,hp:s.hp,dir:s.dir,
               attacking:s.attacking,attackFrame:s.attackFrame,
               hitFlash:s.hitFlash,walkPhase:s.walkPhase,walkBlend:s.walkBlend,moveDir:s.moveDir,
               isUltra:s.isUltra,ultraFlash:s.ultraFlash,weapon:s.weapon,color:s.color };
    }
    function applyNetState(state) {
      if (!state) return;
      Object.assign(player, state.player);
      Object.assign(ai, state.ai);
      bullets    = state.bullets || [];
      particles  = state.particles || [];
      gameOver   = state.gameOver;
      winner     = state.winner;
      shake      = state.shake || 0;
      if (state.ball)      ball      = state.ball;
      if (state.score)     score     = state.score;
      if (state.goalFlash !== undefined) goalFlash = state.goalFlash;
    }

    function update() {
      if (mode === 'online' && onlineRole === 'client') {
        if (onlineConn && onlineConn.open)
          onlineConn.send({ type:'keys', keys: getLocalKeys() });
        applyNetState(onlineGameState);
        return;
      }

      if (gameOver) {
        gameOverTimer--;
        if (gameOverTimer <= 0) {
          init();
        }
        return;
      }

      if (mode === 'story') {
        updateStory();
        return;
      }

      if (mode === 'soccer') {
        updateSoccer();
        updateParticles();
        if (shake > 0) shake *= 0.85;
        if (shake < 0.3) shake = 0;
        return;
      }

      // Online soccer: host runs full soccer loop, client just renders
      if (mode === 'online' && onlineSoccer) {
        updatePlayer();
        updatePlayer2Online();
        stepWalk(player);
        stepWalk(ai);
        updateBall();
        kickBall(player);
        kickBall(ai);
        checkGoal();
        if (goalFlash > 0) goalFlash--;
        updateParticles();
        if (shake > 0) shake *= 0.85;
        if (shake < 0.3) shake = 0;
        if (onlineConn && onlineConn.open) {
          onlineConn.send({ type:'state', player:pickNetState(player), ai:pickNetState(ai),
            particles: particles.slice(-20), gameOver, winner, shake: Math.round(shake),
            ball: ball ? {x:ball.x,y:ball.y,vx:ball.vx,vy:ball.vy,r:ball.r,rot:ball.rot} : null,
            score, goalFlash });
        }
        return;
      }

      updatePlayer();
      if (mode === 'pvp')    updatePlayer2();
      else if (mode === 'online') updatePlayer2Online();
      else                   updateAI();
      stepWalk(player);
      stepWalk(ai);
      resolveHits();
      updateBullets();
      updateParticles();
      if (shake > 0) shake *= 0.85;
      if (shake < 0.3) shake = 0;

      if (player.hp <= 0 || ai.hp <= 0) {
        gameOver = true;
        gameOverTimer = 150;
        winner = ai.hp <= 0 ? 'player' : 'ai';
      }

      // Host sends state to online client
      if (mode === 'online' && onlineRole === 'host' && onlineConn && onlineConn.open) {
        onlineConn.send({ type:'state', player:pickNetState(player), ai:pickNetState(ai),
          bullets: bullets.map(b=>({x:b.x,y:b.y,vx:b.vx,color:b.color,isUltra:b.isUltra,life:b.life})),
          particles: particles.slice(-20), gameOver, winner, shake: Math.round(shake) });
      }
    }

    function drawGoal(side) {
      const x = side < 0 ? 0 : W - GOAL_DEPTH;
      const topY = GROUND - GOAL_HEIGHT;
      ctx.save();
      // Glowing frame
      ctx.strokeStyle = '#FFFFFF';
      ctx.shadowColor = side < 0 ? '#FF2200' : '#0088FF';
      ctx.shadowBlur = 16;
      ctx.lineWidth = 5;
      ctx.strokeRect(x, topY, GOAL_DEPTH, GOAL_HEIGHT);
      // Net mesh
      ctx.shadowBlur = 0;
      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.lineWidth = 1;
      for (let gx = x; gx <= x + GOAL_DEPTH; gx += 7) {
        ctx.beginPath(); ctx.moveTo(gx, topY); ctx.lineTo(gx, GROUND); ctx.stroke();
      }
      for (let gy = topY; gy <= GROUND; gy += 7) {
        ctx.beginPath(); ctx.moveTo(x, gy); ctx.lineTo(x + GOAL_DEPTH, gy); ctx.stroke();
      }
      ctx.restore();
    }

    function drawBall() {
      if (!ball) return;
      const r = ball.r;

      // Ground shadow
      ctx.save();
      const sc = Math.max(0.2, 1 - (GROUND - ball.y) / 380);
      const grad0 = ctx.createRadialGradient(ball.x, GROUND, 0, ball.x, GROUND, r * sc * 1.3);
      grad0.addColorStop(0,   'rgba(0,0,0,0.45)');
      grad0.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = grad0;
      ctx.beginPath();
      ctx.ellipse(ball.x, GROUND, r * sc * 1.3, r * sc * 0.35, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      ctx.save();
      ctx.translate(ball.x, ball.y);

      // --- Sphere base: white with soft 3-D shading ---
      const sphGrad = ctx.createRadialGradient(-r * 0.32, -r * 0.36, r * 0.04, 0, 0, r);
      sphGrad.addColorStop(0,    '#FFFFFF');
      sphGrad.addColorStop(0.55, '#EFEFEF');
      sphGrad.addColorStop(0.88, '#D4D4D4');
      sphGrad.addColorStop(1,    '#BEBEBE');
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fillStyle = sphGrad;
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = 6;
      ctx.fill();
      ctx.shadowBlur = 0;

      // --- Clip everything to ball circle ---
      ctx.save();
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.clip();

      ctx.rotate(ball.rot);

      // Helper: draw a convex polygon with slightly rounded feel
      function patch(cx, cy, pts) {
        ctx.beginPath();
        ctx.moveTo(cx + pts[0][0], cy + pts[0][1]);
        for (let i = 1; i < pts.length; i++) ctx.lineTo(cx + pts[i][0], cy + pts[i][1]);
        ctx.closePath();
      }

      // Helper: get N-gon vertices
      function polyPts(n, pr, startAngle) {
        const pts = [];
        for (let i = 0; i < n; i++) {
          const a = startAngle + (i / n) * Math.PI * 2;
          pts.push([Math.cos(a) * pr, Math.sin(a) * pr]);
        }
        return pts;
      }

      // Black patches — central pentagon + 5 outer pentagons (classic Telstar pattern)
      ctx.fillStyle = '#111111';
      ctx.strokeStyle = '#111111';
      ctx.lineWidth = r * 0.07;

      // Central pentagon
      patch(0, 0, polyPts(5, r * 0.40, -Math.PI / 2));
      ctx.fill();
      ctx.stroke();

      // 5 satellite pentagons
      for (let i = 0; i < 5; i++) {
        const a = -Math.PI / 2 + (i / 5) * Math.PI * 2;
        const cx = Math.cos(a) * r * 0.72;
        const cy = Math.sin(a) * r * 0.72;
        patch(cx, cy, polyPts(5, r * 0.33, a + Math.PI / 5));
        ctx.fill();
        ctx.stroke();
      }

      ctx.restore(); // remove clip

      // --- Specular highlight (top-left) ---
      const shine = ctx.createRadialGradient(-r * 0.3, -r * 0.34, 0, -r * 0.3, -r * 0.34, r * 0.5);
      shine.addColorStop(0,   'rgba(255,255,255,0.82)');
      shine.addColorStop(0.45,'rgba(255,255,255,0.28)');
      shine.addColorStop(1,   'rgba(255,255,255,0)');
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fillStyle = shine;
      ctx.fill();

      ctx.restore();
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      if (mode === 'story') { drawStory(); return; }
      ctx.save();
      if (shake > 0) {
        ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
      }
      const isSoccer = mode === 'soccer' || onlineSoccer;
      drawBackground();
      if (isSoccer) { drawGoal(-1); drawGoal(1); }
      drawParticles();
      drawBullets();
      drawStickman(player);
      drawStickman(ai);
      if (isSoccer) drawBall();
      ctx.restore();
      drawUI();
      drawUltraBanner(player);
      drawUltraBanner(ai);
      if (isSoccer && goalFlash > 0 && !gameOver) drawGoalBanner();
      if (gameOver) drawGameOver();
    }

    function drawGoalBanner() {
      const alpha = Math.min(1, goalFlash / 30);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.font = 'bold 70px Bangers, cursive';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#FFD23D';
      ctx.shadowColor = '#FF3D00';
      ctx.shadowBlur = 40;
      ctx.fillText('⚽ TOOOR! ⚽', W / 2, H / 2 - 30);
      ctx.restore();
    }

    function drawUltraBanner(s) {
      if (s.ultraFlash <= 0) return;
      const alpha = Math.min(1, s.ultraFlash / 20);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.font = 'bold 30px Bangers, cursive';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#FFD23D';
      ctx.shadowColor = '#FF3D00';
      ctx.shadowBlur = 24;
      const yOff = (45 - s.ultraFlash) * 0.8;
      ctx.fillText('⚡ ULTRA! ⚡', s.x, GROUND - 200 - yOff);
      ctx.restore();
    }

    function gameLoop() {
      if (started) {
        update();
        draw();
      } else {
        // Idle background behind the menu
        drawBackground();
      }
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  })();
  </script>
</body>
